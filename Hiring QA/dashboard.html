<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA CV Scoring Dashboard — NHSV Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ────────────────────────────────────────────────────────────────── */
:root {
  /* Surfaces — light mode */
  --bg:       #F1F5F9;
  --surface:  #FFFFFF;
  --surface2: #F8FAFC;
  --surface3: #EFF3F8;
  --border:   #CBD5E1;
  --border2:  #E2E8F0;

  /* Text */
  --text:     #0F172A;
  --text-2:   #334155;
  --text-3:   #64748B;

  /* Badge text */
  --badge-b-text: #1D4ED8;
  --badge-c-text: #92400E;
  --badge-r-text: #991B1B;
  --hl-text:  #1D4ED8;
  --rr-text:  #B91C1C;

  /* Layout bg */
  --header-bg: linear-gradient(160deg, #EFF6FF 0%, #F1F5F9 100%);
  --modal-hdr-bg: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 100%);

  /* Semantic text */
  --q-pass: #065F46;
  --q-warn: #92400E;
  --note-box-color: #92400E;
  --reject-color: #991B1B;

  /* Brand */
  --blue:     #2563EB;
  --blue-dim: rgba(37,99,235,.08);
  --blue-glow:rgba(37,99,235,.18);

  /* Tiers */
  --tier-b:       #2563EB;
  --tier-b-bg:    rgba(37,99,235,.08);
  --tier-b-bd:    rgba(37,99,235,.25);
  --tier-c:       #D97706;
  --tier-c-bg:    rgba(217,119,6,.08);
  --tier-c-bd:    rgba(217,119,6,.25);
  --tier-r:       #DC2626;
  --tier-r-bg:    rgba(220,38,38,.06);
  --tier-r-bd:    rgba(220,38,38,.2);

  /* Semantic */
  --green:    #059669;
  --green-bg: rgba(5,150,105,.08);
  --amber:    #D97706;
  --amber-bg: rgba(217,119,6,.08);
  --red:      #DC2626;
  --red-bg:   rgba(220,38,38,.06);

  /* Bars */
  --bar-d1: linear-gradient(90deg, #6366F1, #818CF8);
  --bar-d2: linear-gradient(90deg, #2563EB, #60A5FA);
  --bar-d3: linear-gradient(90deg, #0891B2, #38BDF8);
  --bar-d4: linear-gradient(90deg, #059669, #34D399);
  --bar-total: linear-gradient(90deg, #7C3AED, #A78BFA);

  /* Motion */
  --ease: cubic-bezier(.4,0,.2,1);
  --dur: 180ms;
}

/* ─── DARK MODE ─────────────────────────────────────────────────────────────── */
[data-theme="dark"] {
  --bg:       #070D1A;
  --surface:  #0F1829;
  --surface2: #162035;
  --surface3: #1C2A45;
  --border:   #263554;
  --border2:  #1E2E4A;
  --text:     #EEF2FF;
  --text-2:   #A8BCDB;
  --text-3:   #637799;
  --badge-b-text: #93C5FD;
  --badge-c-text: #FCD34D;
  --badge-r-text: #FCA5A5;
  --hl-text:  #93C5FD;
  --rr-text:  #FCA5A5;
  --header-bg: linear-gradient(160deg, #0D1E3E 0%, #070D1A 70%);
  --modal-hdr-bg: linear-gradient(135deg, #162035 0%, #0F1829 100%);
  --q-pass: #6EE7B7;
  --q-warn: #FCD34D;
  --note-box-color: #FCD34D;
  --reject-color: #FCA5A5;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── SCROLLBAR ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ─── HEADER ────────────────────────────────────────────────────────────────── */
.header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--border2);
  padding: 22px 32px 18px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 18px;
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

.theme-toggle {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-3);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  transition: all 180ms cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
}
.theme-toggle:hover { color: var(--text); border-color: var(--border); }

.header-brand { display: flex; flex-direction: column; gap: 3px; }

.header-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--tier-b);
  opacity: .8;
}

.header h1 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.02em;
  line-height: 1.2;
}

.header-meta {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 1px;
}

/* Stats strip */
.stats { display: flex; gap: 10px; flex-wrap: wrap; }

.stat {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 18px;
  text-align: center;
  min-width: 72px;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.stat:hover { border-color: var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.06); }

.stat-num {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -.03em;
  line-height: 1;
}

.stat-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-top: 3px;
}

.stat.total .stat-num { color: var(--text); }
.stat.b     .stat-num { color: var(--tier-b); }
.stat.c     .stat-num { color: var(--tier-c); }
.stat.r     .stat-num { color: var(--tier-r); }

/* ─── FILTER BAR ────────────────────────────────────────────────────────────── */
.filter-bar {
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border2);
  background: var(--surface);
  flex-wrap: wrap;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
}

.filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-right: 4px;
  flex-shrink: 0;
}

.filter-btn {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
  line-height: 1.4;
}
.filter-btn:hover { border-color: var(--text-2); color: var(--text); }

.filter-btn.active {
  font-weight: 700;
  border-color: transparent;
}
.filter-btn.all.active   { background: var(--surface3); color: var(--text); border-color: var(--border); }
.filter-btn.fb.active    { background: var(--tier-b-bg); color: var(--tier-b); border-color: var(--tier-b-bd); }
.filter-btn.fc.active    { background: var(--tier-c-bg); color: var(--tier-c); border-color: var(--tier-c-bd); }
.filter-btn.fr.active    { background: var(--tier-r-bg); color: var(--tier-r); border-color: var(--tier-r-bd); }

.filter-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 4px;
  background: rgba(255,255,255,.08);
}

/* ─── PIPELINE FILTER BAR ────────────────────────────────────────────────────── */
.pipeline-filter-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
  box-shadow: none;
}

.pfb {
  padding: 4px 12px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
  line-height: 1.4;
  white-space: nowrap;
}
.pfb:hover { border-color: var(--text-2); color: var(--text); }
.pfb.active { font-weight: 700; border-color: transparent; }

.pfb-all.active  { background: var(--surface3); color: var(--text);   border-color: var(--border); }
.pfb-stage.active{ background: rgba(13,148,136,.1); color: #0d9488;   border-color: rgba(13,148,136,.3); }
.pfb-none.active { background: var(--surface3);   color: var(--text-2); border-color: var(--border); }
.pfb-rej.active  { background: var(--tier-r-bg);  color: var(--tier-r); border-color: var(--tier-r-bd); }

[data-theme="dark"] .pfb-stage.active { background: rgba(20,184,166,.14); color: #2dd4bf; border-color: rgba(45,212,191,.3); }

/* ─── GRID ──────────────────────────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
  gap: 14px;
  padding: 22px 32px;
}

/* ─── CANDIDATE CARD ────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--dur) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.03);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  border-radius: 14px 0 0 14px;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,.4);
}

.card.tier-B  { border-color: var(--tier-b-bd); }
.card.tier-B::before  { background: var(--tier-b); }
.card.tier-B:hover    { border-color: var(--tier-b); box-shadow: 0 8px 24px rgba(37,99,235,.12); transform: translateY(-3px); }

.card.tier-C  { border-color: var(--tier-c-bd); }
.card.tier-C::before  { background: var(--tier-c); }
.card.tier-C:hover    { border-color: var(--tier-c); box-shadow: 0 8px 24px rgba(217,119,6,.10); transform: translateY(-3px); }

.card.tier-REJECT { opacity: .65; border-color: var(--tier-r-bd); }
.card.tier-REJECT::before { background: var(--tier-r); }
.card.tier-REJECT:hover   { opacity: 1; border-color: var(--tier-r); box-shadow: 0 8px 24px rgba(220,38,38,.10); transform: translateY(-3px); }

/* Card header */
.card-hdr {
  padding: 14px 16px 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.card-identity { flex: 1; min-width: 0; }

.card-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-role {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-badges {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

/* Tier badge */
.tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .02em;
  border: 1px solid transparent;
}

.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tier-badge.badge-B {
  background: var(--tier-b-bg);
  color: #93C5FD;
  border-color: var(--tier-b-bd);
}
.tier-badge.badge-B .badge-dot { background: var(--tier-b); box-shadow: 0 0 4px var(--tier-b); }

.tier-badge.badge-C {
  background: var(--tier-c-bg);
  color: #FCD34D;
  border-color: var(--tier-c-bd);
}
.tier-badge.badge-C .badge-dot { background: var(--tier-c); box-shadow: 0 0 4px var(--tier-c); }

.tier-badge.badge-REJECT {
  background: var(--tier-r-bg);
  color: #FCA5A5;
  border-color: var(--tier-r-bd);
}
.tier-badge.badge-REJECT .badge-dot { background: var(--tier-r); }
.tier-badge.badge-OVERRIDE {
  background: rgba(124,58,237,.10);
  color: #C4B5FD;
  border-color: rgba(124,58,237,.3);
}
.tier-badge.badge-OVERRIDE .badge-dot { background: #7C3AED; box-shadow: 0 0 4px #7C3AED; }
[data-theme="light"] .tier-badge.badge-OVERRIDE { color: #6D28D9; }

.notes-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  background: rgba(251,191,36,.08);
  color: #FCD34D;
  border: 1px solid rgba(251,191,36,.2);
  letter-spacing: .02em;
}

.decision-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  border: 1px solid transparent;
}
.decision-pill.dp-proceed { background: var(--green-bg); color: #6EE7B7; border-color: rgba(16,185,129,.25); }
.decision-pill.dp-reject  { background: var(--red-bg);   color: #FCA5A5; border-color: rgba(239,68,68,.2); }
.decision-pill.dp-hold    { background: var(--amber-bg); color: #FCD34D; border-color: rgba(245,158,11,.2); }

/* Score bars */
.card-bars { padding: 2px 18px 10px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.bar-row:last-child { margin-bottom: 0; }

.bar-lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  width: 26px;
  flex-shrink: 0;
  letter-spacing: .02em;
}

.bar-track {
  flex: 1;
  background: var(--surface3);
  border-radius: 99px;
  height: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width .45s var(--ease);
}

.bd1 { background: var(--bar-d1); }
.bd2 { background: var(--bar-d2); }
.bd3 { background: var(--bar-d3); }
.bd4 { background: var(--bar-d4); }
.btotal { background: var(--bar-total); height: 7px; }

.bar-val {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-2);
  width: 24px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* Highlight / reject strip */
.card-hl {
  margin: 0 18px 10px;
  background: rgba(37,99,235,.05);
  border-left: 2px solid rgba(37,99,235,.35);
  border-radius: 0 6px 6px 0;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--hl-text);
  line-height: 1.4;
}

.card-rr {
  margin: 0 18px 10px;
  background: rgba(220,38,38,.05);
  border-left: 2px solid rgba(220,38,38,.35);
  border-radius: 0 6px 6px 0;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--rr-text);
  line-height: 1.4;
}

/* Card footer */
.card-footer {
  padding: 10px 18px 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border2);
  margin-top: auto;
  background: var(--surface2);
}

.score-block { display: flex; align-items: baseline; gap: 3px; }
.score-total { font-size: 22px; font-weight: 900; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
.score-max   { font-size: 11px; color: var(--text-3); font-weight: 500; }
.score-reject-label { font-size: 13px; font-weight: 700; color: var(--tier-r); letter-spacing: -.01em; }

.card-btn {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid transparent;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
  letter-spacing: .01em;
}

.btn-interview {
  background: var(--tier-b-bg);
  color: #93C5FD;
  border-color: var(--tier-b-bd);
}
.btn-interview:hover { background: var(--tier-b); color: #fff; border-color: var(--tier-b); }

.btn-test {
  background: rgba(245,158,11,.08);
  color: #FCD34D;
  border-color: rgba(245,158,11,.25);
}
.btn-test:hover { background: var(--tier-c); color: #000; border-color: var(--tier-c); }

.btn-reject {
  background: var(--tier-r-bg);
  color: #FCA5A5;
  border-color: var(--tier-r-bd);
}
.btn-second {
  background: rgba(139,92,246,.08);
  color: #C4B5FD;
  border-color: rgba(139,92,246,.25);
}
.btn-second:hover { background: rgba(139,92,246,.2); border-color: #8B5CF6; }

/* ─── OVERLAY / MODAL ───────────────────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.45);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur) var(--ease);
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: min(98vw, 1700px);
  height: 96vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(16px) scale(.98);
  transition: transform .26s var(--ease);
  box-shadow: 0 24px 60px rgba(0,0,0,.18), 0 8px 16px rgba(0,0,0,.08);
}
.overlay.open .modal { transform: translateY(0) scale(1); }

.modal-hdr {
  padding: 14px 22px;
  border-bottom: 1px solid var(--border2);
  background: var(--modal-hdr-bg);
  flex-shrink: 0;
}

.modal-hdr-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 10px;
}

/* Modal body — two-panel layout */
.modal-body {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.modal-left {
  width: 44%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border2);
  min-width: 0;
}

.modal-right {
  width: 56%;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.cv-panel {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  padding: 12px;
  gap: 8px;
}

.cv-panel-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.cv-panel-frame {
  flex: 1;
  min-height: 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
}

.cv-panel-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.cv-panel-note {
  font-size: 10px;
  color: var(--text-3);
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: 6px;
  border-left: 2px solid var(--border);
  line-height: 1.5;
  flex-shrink: 0;
}

.modal-name {
  font-size: 19px;
  font-weight: 800;
  letter-spacing: -.02em;
}

.modal-sub {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 3px;
  font-weight: 400;
}

.modal-hdr-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 7px;
  flex-shrink: 0;
}

.modal-close {
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text-3);
  border-radius: 8px;
  padding: 5px 11px;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
}
.modal-close:hover { color: var(--text); background: var(--border2); border-color: var(--border); }

/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border2);
  background: var(--surface2);
  padding: 0 16px;
  gap: 2px;
  flex-shrink: 0;
}

.tab-btn {
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all var(--dur) var(--ease);
  white-space: nowrap;
  font-family: inherit;
  letter-spacing: .01em;
}
.tab-btn:hover { color: var(--text-2); }
.tab-btn.active { color: var(--tier-b); border-bottom-color: var(--tier-b); }

.tab-content { display: none; padding: 18px 20px; flex: 1; overflow-y: auto; min-height: 0; }
.tab-content.active { display: block; }

/* ─── SCORE TAB ─────────────────────────────────────────────────────────────── */
.sec-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 10px;
}

.score-detail {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.03);
}

.dim-row { margin-bottom: 12px; }
.dim-row:last-child { margin-bottom: 0; }

.dim-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
  font-size: 11px;
}

.dim-name { color: var(--text); font-weight: 600; }

.dim-val {
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.01em;
}

.dim-row:nth-child(1) .dim-val { color: #4F46E5; }
.dim-row:nth-child(2) .dim-val { color: #2563EB; }
.dim-row:nth-child(3) .dim-val { color: #0891B2; }
.dim-row:nth-child(4) .dim-val { color: #059669; }

.dim-bar {
  background: var(--surface3);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
}

.sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 12px;
  margin-top: 6px;
}

.sub-item {
  font-size: 10px;
  color: var(--text-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1px 0;
}

.sub-item span:last-child {
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}

/* Total display */
.total-display {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 12px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.03);
}

.total-num {
  font-size: 44px;
  font-weight: 900;
  letter-spacing: -.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.tn-b { color: #1D4ED8; }
.tn-c { color: #B45309; }
.tn-reject { color: #DC2626; }
.tn-r { color: #B91C1C; }

.total-info { flex: 1; }

.total-tier {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 3px;
  letter-spacing: -.01em;
}

.total-group {
  font-size: 11px;
  color: var(--text-3);
}

.hc-pass { color: var(--green); font-weight: 700; }
.hc-fail { color: var(--tier-r); font-weight: 700; }

/* Pros/Cons */
.pc-section { margin: 16px 0; }

.pc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.pc-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 13px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

.pc-pros { border-top: 2px solid var(--green); }
.pc-cons { border-top: 2px solid var(--tier-r); }

.pc-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 8px;
}
.pc-pros .pc-title { color: var(--green); }
.pc-cons .pc-title { color: var(--tier-r); }

.pc-list { list-style: none; }

.pc-list li {
  font-size: 11px;
  line-height: 1.5;
  padding: 3px 0;
  border-bottom: 1px solid var(--border2);
  display: flex;
  gap: 7px;
}
.pc-list li:last-child { border-bottom: none; }

.pc-list.pros li::before { content: '+'; color: var(--green); font-weight: 800; flex-shrink: 0; }
.pc-list.cons li::before { content: '−'; color: var(--tier-r); font-weight: 800; flex-shrink: 0; font-size: 14px; line-height: 1.2; }

.note-box {
  background: rgba(217,119,6,.06);
  border: 1px solid rgba(217,119,6,.2);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 11px;
  color: var(--note-box-color);
  margin-top: 12px;
  line-height: 1.5;
}

/* Interview questions */
.q-wrap {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

.q-hdr {
  padding: 10px 14px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .08em;
  border-bottom: 1px solid var(--border2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface2);
}

.q-gbadge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  letter-spacing: .04em;
}
.gb-b { background: rgba(59,130,246,.12); color: #93C5FD; border: 1px solid rgba(59,130,246,.25); }
.gb-c { background: rgba(139,92,246,.12); color: #C4B5FD; border: 1px solid rgba(139,92,246,.25); }

.q-item { border-bottom: 1px solid var(--border2); }
.q-item:last-child { border-bottom: none; }

.q-q {
  padding: 10px 14px;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.55;
  transition: background var(--dur) var(--ease);
}
.q-q:hover { background: var(--surface2); }

.q-num { color: var(--tier-b); font-weight: 700; flex-shrink: 0; }

.q-arrow {
  color: var(--text-3);
  flex-shrink: 0;
  transition: transform var(--dur) var(--ease);
  font-size: 13px;
  margin-top: 1px;
}
.q-item.open .q-arrow { transform: rotate(90deg); }

.q-detail {
  padding: 0 14px 10px 14px;
  font-size: 10px;
  color: var(--text-3);
  line-height: 1.65;
  display: none;
  border-top: 1px solid var(--border2);
}
.q-item.open .q-detail { display: block; }

.q-intent { margin-bottom: 5px; font-style: italic; color: var(--text-2); }
.q-pass { color: var(--q-pass); margin-top: 4px; }
.q-warn { color: var(--q-warn); margin-top: 4px; }

/* ─── CV TAB ────────────────────────────────────────────────────────────────── */
.cv-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}

.cv-btn {
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
}

.cv-open {
  background: var(--tier-b-bg);
  color: #93C5FD;
  border-color: var(--tier-b-bd);
}
.cv-open:hover { background: var(--tier-b); color: #fff; border-color: var(--tier-b); }

.cv-dl {
  background: var(--surface2);
  color: var(--text-2);
  border-color: var(--border);
}
.cv-dl:hover { border-color: var(--text-2); }

.cv-filename {
  font-size: 11px;
  color: var(--text-3);
  margin-left: auto;
}

.cv-frame-wrap {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
}
.cv-frame { width: 100%; height: 560px; border: none; display: block; }

.cv-note {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 8px;
  padding: 8px 11px;
  background: var(--surface2);
  border-radius: 7px;
  border-left: 2px solid var(--border);
  line-height: 1.5;
}

/* ─── NOTES TAB ─────────────────────────────────────────────────────────────── */
.notes-form { display: flex; flex-direction: column; gap: 14px; }

.notes-form-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.notes-saved {
  font-size: 10px;
  color: var(--green);
  font-weight: 600;
  transition: opacity .5s;
  opacity: 0;
}
.notes-saved.show { opacity: 1; }

.notes-meta {
  font-size: 11px;
  color: var(--text-3);
  margin-top: -6px;
}
.notes-meta strong { color: var(--text-2); font-weight: 600; }

.user-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 12px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
  white-space: nowrap;
}
.user-chip:hover { border-color: var(--blue); color: var(--blue); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .07em;
}

.form-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 11px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  min-height: 36px;
}
.form-input:focus { border-color: var(--tier-b); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.form-input::placeholder { color: var(--text-3); }
textarea.form-input { resize: vertical; min-height: 72px; }

/* Star ratings */
.ratings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.rating-group {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 9px;
  padding: 10px 12px;
}

.rating-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 7px;
}

.stars { display: flex; gap: 3px; }

.star {
  font-size: 18px;
  cursor: pointer;
  color: var(--border);
  transition: color var(--dur) var(--ease), transform var(--dur) var(--ease);
  user-select: none;
  line-height: 1;
}
.star:hover { transform: scale(1.15); }
.star.lit { color: #FBBF24; }

/* Decision */
.decision-group {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 9px;
  padding: 11px 13px;
}

.decision-opts { display: flex; gap: 8px; margin-top: 9px; flex-wrap: wrap; }

.decision-opt {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
  background: var(--surface2);
  color: var(--text-3);
}
.decision-opt input { display: none; }

.decision-opt.proceed      { border-color: rgba(5,150,105,.3);  color: #065F46; }
.decision-opt.hold         { border-color: rgba(217,119,6,.3);  color: #92400E; }
.decision-opt.reject-d     { border-color: rgba(220,38,38,.3);  color: #991B1B; }

.decision-opt.selected.proceed  { background: rgba(5,150,105,.08);  border-color: #059669; color: #065F46; }
.decision-opt.selected.hold     { background: rgba(217,119,6,.08);  border-color: #D97706; color: #92400E; }
.decision-opt.selected.reject-d { background: rgba(220,38,38,.07);  border-color: #DC2626; color: #991B1B; }

.save-btn {
  background: var(--tier-b);
  color: #fff;
  border: none;
  border-radius: 9px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--dur) var(--ease);
  width: 100%;
  letter-spacing: .01em;
}
.save-btn:hover { background: #1D4ED8; box-shadow: 0 4px 14px rgba(37,99,235,.25); }

/* Reject overlay */
.reject-overlay {
  background: rgba(220,38,38,.05);
  border: 1px solid rgba(220,38,38,.18);
  border-radius: 10px;
  padding: 16px;
  font-size: 12px;
  color: var(--reject-color);
  text-align: center;
  line-height: 1.7;
}

.reject-overlay strong { font-size: 14px; font-weight: 800; display: block; margin-bottom: 8px; letter-spacing: -.01em; color: var(--rr-text); }

/* Empty state */
.no-interviews {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px;
  font-size: 12px;
  color: var(--text-3);
  text-align: center;
  margin-top: 16px;
  line-height: 1.6;
}

/* ─── PIPELINE STEPPER (MODAL HDR) ─────────────────────────────────────────── */
.pipeline-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 8px 0 4px;
  flex-wrap: nowrap;
  overflow-x: auto;
  width: 100%;
}

.pip-step {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
}

.pip-pill {
  flex: 1;
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface3);
  color: var(--text-3);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 180ms cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
  text-align: center;
  letter-spacing: .01em;
  min-width: 0;
  text-overflow: ellipsis;
  overflow: hidden;
  position: relative;
}
.pip-pill:hover { border-color: var(--border); color: var(--text-2); }
.pip-pill.pip-done {
  background: rgba(5,150,105,.1);
  color: #059669;
  border-color: rgba(5,150,105,.3);
}
.pip-pill.pip-active {
  background: var(--tier-b-bg);
  color: var(--tier-b);
  border-color: var(--tier-b-bd);
  font-weight: 700;
}
.pip-pill.pip-rejected {
  background: var(--tier-r-bg);
  color: var(--tier-r);
  border-color: var(--tier-r-bd);
}
.pip-pill.pip-failed {
  background: rgba(217,119,6,.1);
  color: #D97706;
  border-color: rgba(217,119,6,.35);
  font-weight: 700;
}
[data-theme="dark"] .pip-pill.pip-failed { background: rgba(217,119,6,.15); color: #FCD34D; border-color: rgba(217,119,6,.4); }
.pip-pill.pip-pending {
  background: transparent;
  color: var(--text-3);
  border-color: var(--border2);
}

.pip-connector {
  width: 18px;
  height: 2px;
  background: var(--border2);
  flex-shrink: 0;
}
.pip-connector.done { background: #059669; opacity: .5; }

.pip-reset {
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-3);
  font-size: 10px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 180ms;
  white-space: nowrap;
  margin-left: 8px;
}
.pip-reset:hover { border-color: var(--border); color: var(--text-2); }

/* ─── MINI STEPPER (CARD) ───────────────────────────────────────────────────── */
.mini-stepper {
  padding: 8px 18px 11px;
  display: flex;
  align-items: center;
  gap: 0;
}

.ms-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--surface3);
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  transition: all 200ms;
}
.ms-dot.done     { background: #059669; border-color: #059669; }
.ms-dot.active   { background: var(--tier-b); border-color: var(--tier-b); box-shadow: 0 0 0 3px rgba(37,99,235,.15); animation: ms-pulse 1.6s ease-in-out infinite; }
.ms-dot.rejected { background: var(--tier-r); border-color: var(--tier-r); animation: none; }
.ms-dot.failed   { background: #D97706; border-color: #D97706; animation: none; }

@keyframes ms-pulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
  50%       { box-shadow: 0 0 0 5px rgba(37,99,235,.08); }
}

.ms-line {
  flex: 1;
  height: 2px;
  background: var(--border2);
  min-width: 8px;
}
.ms-line.done { background: rgba(5,150,105,.4); }

/* ─── PIPELINE STATE BAR & HISTORY ─────────────────────────────────────────── */
.pip-state-bar {
  margin-top: 8px;
  padding: 6px 12px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  border: 1px solid;
}
.psb-status {
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.psb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.psb-stage { color: var(--text-2); font-weight: 500; }
.psb-meta  { color: var(--text-3); font-size: 10px; margin-left: auto; flex-shrink: 0; }

.pip-state-bar.psb-active   { background: var(--tier-b-bg); border-color: var(--tier-b-bd); color: var(--tier-b); }
.pip-state-bar.psb-active .psb-dot { background: var(--tier-b); }
.pip-state-bar.psb-failed   { background: rgba(217,119,6,.08); border-color: rgba(217,119,6,.3); color: #D97706; }
.pip-state-bar.psb-failed .psb-dot { background: #D97706; }
.pip-state-bar.psb-rejected { background: var(--tier-r-bg); border-color: var(--tier-r-bd); color: var(--tier-r); }
.pip-state-bar.psb-rejected .psb-dot { background: var(--tier-r); }

.pip-history { margin-top: 6px; }

.ph-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 4px;
}

.ph-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 96px;
  overflow-y: auto;
}

.ph-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  line-height: 1.4;
}
.ph-icon  { flex-shrink: 0; width: 12px; text-align: center; font-size: 11px; }
.ph-by    { font-weight: 600; color: var(--text-2); flex-shrink: 0; min-width: 56px; }
.ph-what  { flex: 1; color: var(--text-2); }
.ph-at    { color: var(--text-3); flex-shrink: 0; font-variant-numeric: tabular-nums; }

.ph-entry.phe-active   { border-color: rgba(37,99,235,.15); }
.ph-entry.phe-failed   { border-color: rgba(217,119,6,.2);  }
.ph-entry.phe-rejected { border-color: rgba(220,38,38,.15); }
.ph-entry.phe-reset    { opacity: .55; }

/* ─── CARD PIPELINE STATES ──────────────────────────────────────────────────── */
.card.pip-terminated {
  opacity: .52;
}
.card.pip-terminated:hover {
  opacity: .88;
  transform: translateY(-2px) !important;
  box-shadow: 0 6px 18px rgba(0,0,0,.08) !important;
}

.card.pip-advancing {
  border-color: rgba(5,150,105,.3) !important;
  background: linear-gradient(175deg, rgba(5,150,105,.05) 0%, var(--surface) 52px) !important;
}
.card.pip-advancing:hover {
  border-color: rgba(5,150,105,.55) !important;
  box-shadow: 0 8px 24px rgba(5,150,105,.12) !important;
}

.card.pip-offer {
  border-color: rgba(5,150,105,.45) !important;
  background: linear-gradient(175deg, rgba(5,150,105,.1) 0%, var(--surface) 60px) !important;
}
.card.pip-offer:hover {
  border-color: #059669 !important;
  box-shadow: 0 8px 28px rgba(5,150,105,.18) !important;
}

[data-theme="dark"] .card.pip-advancing { background: linear-gradient(175deg, rgba(5,150,105,.08) 0%, var(--surface) 52px) !important; }
[data-theme="dark"] .card.pip-offer     { background: linear-gradient(175deg, rgba(5,150,105,.13) 0%, var(--surface) 60px) !important; }

/* ─── FILTER SEPARATOR ──────────────────────────────────────────────────────── */
.pfb-sep {
  width: 1px;
  height: 16px;
  background: var(--border);
  flex-shrink: 0;
  align-self: center;
  margin: 0 2px;
}

/* ─── CARD ACTIONS ──────────────────────────────────────────────────────────── */
.card-actions {
  padding: 7px 16px 10px 18px;
  display: flex;
  align-items: center;
  gap: 5px;
  border-top: 1px solid var(--border2);
  background: var(--surface2);
}

.qa-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;

// ─── PIPELINE STAGES ────────────────────────────────────────────────────────
const STAGES = ['Gửi Bài test', 'Phỏng vấn vòng 1', 'Phỏng vấn vòng 2', 'Offer letter'];

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentPipelineFilter = 'all';
let currentId = null;
let saveTimer = null;

// ─── SHARED BACKEND ──────────────────────────────────────────────────────────
let notesCache = {};
let currentUser = '';
const LS_NOTES_KEY = 'qa-notes-v1';

function initUser() {
  currentUser = localStorage.getItem('qa-user') || '';
  if (!currentUser) {
    const name = prompt('Bạn là ai?\n(Tên sẽ hiển thị khi bạn ghi chú — VD: "Midu", "HR Thảo")');
    currentUser = (name && name.trim()) ? name.trim() : 'Ẩn danh';
    localStorage.setItem('qa-user', currentUser);
  }
  const el = document.getElementById('current-user-label');
  if (el) el.textContent = currentUser;
}

function changeUser() {
  const name = prompt('Đổi tên ghi chú:', currentUser);
  if (name && name.trim()) {
    currentUser = name.trim();
    localStorage.setItem('qa-user', currentUser);
    const el = document.getElementById('current-user-label');
    if (el) el.textContent = currentUser;
  }
}

function loadLocalNotes() {
  try { return JSON.parse(localStorage.getItem(LS_NOTES_KEY) || '{}'); } catch { return {}; }
}

function saveLocalNotes(cache) {
  try { localStorage.setItem(LS_NOTES_KEY, JSON.stringify(cache)); } catch {}
}

async function loadAllNotes() {
  // Load localStorage immediately so UI is responsive even if backend is slow
  const local = loadLocalNotes();
  if (Object.keys(local).length > 0) notesCache = local;

  try {
    const r = await fetch('/api/notes');
    if (r.ok) {
      const backend = (await r.json()) || {};
      // Merge: backend wins for keys it has (shared state), keep local for keys backend lacks
      notesCache = { ...local, ...backend };
      saveLocalNotes(notesCache);
    }
  } catch { /* offline — use localStorage */ }
}

async function syncNotes() {
  const prev = JSON.stringify(notesCache);
  await loadAllNotes();
  if (JSON.stringify(notesCache) !== prev) {
    renderCards(currentFilter);
    if (currentId) buildPipelineStepper(currentId);
  }
}

async function postNote(id, data) {
  // Save to localStorage immediately — never fails, survives page refresh
  const local = loadLocalNotes();
  local[id] = data;
  saveLocalNotes(local);
  notesCache[id] = data;

  // Then sync to backend for cross-user visibility
  try {
    await fetch('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, data })
    });
  } catch { /* backend unavailable — localStorage covers persistence */ }
}

// ─── NOTES ──────────────────────────────────────────────────────────────────
function getNotes(id) {
  return notesCache[id] || {};
}

function hasNotes(id) {
  const n = getNotes(id);
  return n.notes || n.decision || n.interviewer || n.date || n.actionItems ||
    n.domainScore || n.qaScore || n.commScore || n.cultureScore;
}

async function saveNotes() {
  if (!currentId) return;
  const existing = getNotes(currentId);
  // Note-taking (date/interviewer/ratings/comments/decision) is not a pipeline
  // status change, so it must NOT touch updatedAt/updatedBy/history — those
  // only move when setPipeline/resetPipeline fires (gửi bài test, PV, fail, loại...).
  const n = {
    ...existing,
    date:        (document.getElementById('n-date') || {}).value || '',
    interviewer: (document.getElementById('n-interviewer') || {}).value || '',
    domainScore: +((document.querySelector('.stars[data-dim="domain"] .star.lit:last-of-type') || {}).dataset?.val || 0),
    qaScore:     +((document.querySelector('.stars[data-dim="qa"] .star.lit:last-of-type') || {}).dataset?.val || 0),
    commScore:   +((document.querySelector('.stars[data-dim="comm"] .star.lit:last-of-type') || {}).dataset?.val || 0),
    cultureScore:+((document.querySelector('.stars[data-dim="culture"] .star.lit:last-of-type') || {}).dataset?.val || 0),
    notes:       (document.getElementById('n-notes') || {}).value || '',
    decision:    (document.querySelector('.decision-opt.selected') || {}).dataset?.val || '',
    actionItems: (document.getElementById('n-actions') || {}).value || ''
  };
  notesCache[currentId] = n;
  await postNote(currentId, n);
  const el = document.getElementById('n-saved');
  if (el) {
    el.textContent = '✓ Đã lưu ghi chú';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
  renderCards(currentFilter);
  refreshDecisionBadge(n.decision);
}

// ─── PIPELINE ────────────────────────────────────────────────────────────────
const STAGE_LABELS = ['', '', 'Gửi Bài test', 'PV Vòng 1', 'PV Vòng 2', 'Offer letter'];

async function setPipeline(id, stageIdx, status) {
  const existing = getNotes(id);
  const history = Array.isArray(existing.history) ? [...existing.history] : [];
  history.unshift({ stage: stageIdx, stageName: STAGE_LABELS[stageIdx] || '—', status, by: currentUser, at: new Date().toLocaleDateString('vi-VN') });
  const n = { ...existing, pipeline: stageIdx, pipelineStatus: status, updatedBy: currentUser, updatedAt: new Date().toLocaleDateString('vi-VN'), history };
  notesCache[id] = n;
  await postNote(id, n);
  renderCards(currentFilter);
  if (currentId === id) buildPipelineStepper(id);
}

async function resetPipeline(id) {
  const existing = getNotes(id);
  const history = Array.isArray(existing.history) ? [...existing.history] : [];
  history.unshift({ stage: 0, stageName: '—', status: 'reset', by: currentUser, at: new Date().toLocaleDateString('vi-VN') });
  const n = { ...existing, pipeline: 0, pipelineStatus: '', updatedBy: currentUser, updatedAt: new Date().toLocaleDateString('vi-VN'), history };
  notesCache[id] = n;
  await postNote(id, n);
  renderCards(currentFilter);
  if (currentId === id) buildPipelineStepper(id);
}

function buildPipelineStepper(id) {
  const el = document.getElementById('m-pipeline-stepper');
  if (!el) return;
  const n = getNotes(id);
  const pipeline = n.pipeline || 0;
  const status = n.pipelineStatus || '';

  let html = '<div class="pipeline-stepper">';
  STAGES.forEach((s, i) => {
    const stageNum = i + 2;
    let cls = 'pip-pending';
    let prefix = '';
    if (stageNum < pipeline) { cls = 'pip-done'; prefix = '✓ '; }
    else if (stageNum === pipeline) {
      if (status === 'rejected')         { cls = 'pip-rejected'; prefix = '✕ '; }
      else if (status === 'failed-test') { cls = 'pip-failed';   prefix = '✗ '; }
      else if (status === 'failed-cv')   { cls = 'pip-failed';   prefix = '✗ '; }
      else                               { cls = 'pip-active';   prefix = ''; }
    }
    const connCls = stageNum < pipeline ? 'done' : '';
    // Stage 2 (index 0) = Bài test → right-click: failed-test; others → rejected
    const rclkStatus = (i === 0) ? 'failed-test' : 'rejected';
    html += `<div class="pip-step">
      <button class="pip-pill ${cls}" title="${s} (click: active · right-click: ${i === 1 ? 'fail test' : 'loại'})"
        onclick="setPipeline('${id}', ${stageNum}, 'active')"
        oncontextmenu="event.preventDefault();setPipeline('${id}', ${stageNum}, '${rclkStatus}')"
      >${prefix}${s}</button>
    </div>`;
    if (i < STAGES.length - 1) {
      html += `<div class="pip-connector ${connCls}"></div>`;
    }
  });
  html += `<button class="pip-reset" onclick="resetPipeline('${id}')">Reset</button>`;
  html += '</div>';

  // ── State summary bar ──
  let stateBar = '';
  if (pipeline > 0) {
    let barCls, icon, statusLabel;
    if (status === 'rejected')         { barCls = 'psb-rejected'; icon = '✕'; statusLabel = 'Bị loại'; }
    else if (status === 'failed-test') { barCls = 'psb-failed';   icon = '✗'; statusLabel = 'Fail Test'; }
    else if (status === 'failed-cv')   { barCls = 'psb-failed';   icon = '✗'; statusLabel = 'Fail CV'; }
    else                               { barCls = 'psb-active';   icon = '→'; statusLabel = 'Đang tiến hành'; }
    const meta = n.updatedBy ? `${n.updatedBy} · ${parseUpdateDate(n.updatedAt) || ''}` : '';
    stateBar = `<div class="pip-state-bar ${barCls}">
      <div class="psb-status"><span class="psb-dot"></span>${icon} ${statusLabel}</div>
      <span class="psb-stage">${STAGE_LABELS[pipeline] || ''}</span>
      ${meta ? `<span class="psb-meta">${meta}</span>` : ''}
    </div>`;
  }

  // ── History list ──
  const history = n.history || [];
  let historyHtml = '';
  if (history.length > 0) {
    const entryMap = {
      'active':      { icon: '→', cls: 'phe-active',   fmt: sn => sn },
      'rejected':    { icon: '✕', cls: 'phe-rejected', fmt: sn => `Loại — ${sn}` },
      'failed-test': { icon: '✗', cls: 'phe-failed',   fmt: sn => `Fail Test — ${sn}` },
      'failed-cv':   { icon: '✗', cls: 'phe-failed',   fmt: sn => `Fail CV — ${sn}` },
      'reset':       { icon: '↺', cls: 'phe-reset',    fmt: ()  => 'Reset pipeline' }
    };
    const rows = history.slice(0, 15).map(h => {
      const e = entryMap[h.status] || { icon: '·', cls: '', fmt: sn => sn };
      const dateShort = parseUpdateDate(h.at) || '';
      return `<div class="ph-entry ${e.cls}">
        <span class="ph-icon">${e.icon}</span>
        <span class="ph-by">${h.by || '—'}</span>
        <span class="ph-what">${e.fmt(h.stageName || '—')}</span>
        <span class="ph-at">${dateShort}</span>
      </div>`;
    }).join('');
    historyHtml = `<div class="pip-history">
      <div class="ph-label">Lịch sử · ${history.length} cập nhật</div>
      <div class="ph-list">${rows}</div>
    </div>`;
  }

  el.innerHTML = html + stateBar + historyHtml;
}

function buildMiniStepper(id) {
  const n = getNotes(id);
  const pipeline = n.pipeline || 0;
  const status = n.pipelineStatus || '';
  if (pipeline === 0 && status === '') return '';

  let html = '<div class="mini-stepper">';
  STAGES.forEach((s, i) => {
    const stageNum = i + 2;
    let cls = '';
    if (stageNum < pipeline) cls = 'done';
    else if (stageNum === pipeline) {
      if (status === 'rejected')         cls = 'rejected';
      else if (status === 'failed-test') cls = 'failed';
      else if (status === 'failed-cv')   cls = 'failed';
      else                               cls = 'active';
    }
    if (i > 0) {
      const lineCls = stageNum <= pipeline ? 'done' : '';
      html += `<div class="ms-line ${lineCls}"></div>`;
    }
    html += `<div class="ms-dot ${cls}" title="${s}"></div>`;
  });
  html += '</div>';
  return html;
}

function buildCardActions(id) {
  const n = getNotes(id);
  const pipeline = n.pipeline || 0;
  const status = n.pipelineStatus || '';

  const stageNames  = ['—', '', 'Gửi Bài test', 'PV Vòng 1', 'PV Vòng 2', 'Offer'];
  const nextLabels  = ['', '', '→ PV Vòng 1', '→ PV Vòng 2', '→ Offer', ''];

  let labelText = '', labelCls = '', btns = '';

  if (pipeline === 0) {
    labelText = 'Chưa có stage'; labelCls = '';
    btns = `<button class="qa-btn qa-next"   onclick="event.stopPropagation();setPipeline('${id}',2,'active')">Gửi Bài test ▶</button>
            <button class="qa-btn qa-fail"   onclick="event.stopPropagation();setPipeline('${id}',2,'failed-cv')">✗ Fail CV</button>
            <button class="qa-btn qa-reject" onclick="event.stopPropagation();setPipeline('${id}',2,'rejected')">⊗ Loại</button>`;

  } else if (status === 'rejected') {
    labelText = '✕ Bị loại'; labelCls = 'ql-rejected';
    btns = `<button class="qa-btn qa-restore" onclick="event.stopPropagation();setPipeline('${id}',${pipeline},'active')">↺ Khôi phục</button>`;

  } else if (status === 'failed-cv') {
    labelText = '✗ Fail CV'; labelCls = 'ql-failed';
    btns = `<button class="qa-btn qa-restore" onclick="event.stopPropagation();setPipeline('${id}',2,'active')">↺ Retry</button>
            <button class="qa-btn qa-reject"  onclick="event.stopPropagation();setPipeline('${id}',2,'rejected')">⊗ Loại</button>`;

  } else if (status === 'failed-test') {
    labelText = '✗ Fail Test'; labelCls = 'ql-failed';
    btns = `<button class="qa-btn qa-restore" onclick="event.stopPropagation();setPipeline('${id}',2,'active')">↺ Retry</button>
            <button class="qa-btn qa-reject"  onclick="event.stopPropagation();setPipeline('${id}',2,'rejected')">⊗ Loại</button>`;

  } else {
    labelText = stageNames[pipeline]; labelCls = pipeline === 5 ? 'ql-done' : 'ql-active';
    if (pipeline < 5) {
      btns += `<button class="qa-btn qa-next" onclick="event.stopPropagation();setPipeline('${id}',${pipeline+1},'active')">${nextLabels[pipeline]}</button>`;
    }
    if (pipeline === 2) {
      btns += `<button class="qa-btn qa-fail" onclick="event.stopPropagation();setPipeline('${id}',2,'failed-test')">✗ Fail</button>`;
    }
    btns += `<button class="qa-btn qa-reject" onclick="event.stopPropagation();setPipeline('${id}',${pipeline},'rejected')">⊗ Loại</button>`;
  }

  return `<div class="card-actions"><span class="qa-label ${labelCls}">${labelText}</span>${btns}</div>`;
}

function autoSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveNotes, 800); }

// ─── DATE HELPERS ────────────────────────────────────────────────────────────
function parseUpdateDate(updatedAt) {
  if (!updatedAt) return null;
  // Match d/m/yyyy anywhere in the string — tolerant of legacy "HH:MM:SS d/m/yyyy"
  // values (no comma, time before date) as well as the current date-only format.
  const match = updatedAt.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (!match) return null;
  const [, d, m, y] = match;
  return `${d.padStart(2, '0')}/${m.padStart(2, '0')}/${y}`;
}

// ─── RENDER CARDS ────────────────────────────────────────────────────────────
function updatePipelineCounts() {
  const tierList = currentFilter === 'all' ? CV : CV.filter(c => c.tier === currentFilter);
  const counts = { all: tierList.length, 2: 0, 3: 0, 4: 0, 5: 0, none: 0, terminated: 0 };
  tierList.forEach(c => {
    const n = getNotes(c.id);
    const p = n.pipeline || 0;
    const s = n.pipelineStatus || '';
    const isTerminated = (c.tier === 'REJECT' && p === 0 && s === '') || ['rejected','failed-test','failed-cv'].includes(s);
    if (isTerminated)           counts.terminated++;
    else if (p === 0)           counts.none++;
    else if (p >= 2 && p <= 5) counts[p]++;
  });
  const idMap = { all: 'pfc-all', 2: 'pfc-2', 3: 'pfc-3', 4: 'pfc-4', 5: 'pfc-5', none: 'pfc-none', terminated: 'pfc-rej' };
  const statR = document.getElementById('stat-r');
  if (statR) statR.textContent = counts.terminated;
  Object.entries(idMap).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = counts[k] ?? 0;
  });
}

function renderCards(f) {
  currentFilter = f;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let list = f === 'all' ? CV : CV.filter(c => c.tier === f);

  if (currentPipelineFilter !== 'all') {
    list = list.filter(c => {
      const n = getNotes(c.id);
      const p = n.pipeline || 0;
      const s = n.pipelineStatus || '';
      const isTerminated = (c.tier === 'REJECT' && p === 0 && s === '') || ['rejected','failed-test','failed-cv'].includes(s);
      if (currentPipelineFilter === 'none')       return p === 0 && !isTerminated;
      if (currentPipelineFilter === 'terminated') return isTerminated;
      return p === +currentPipelineFilter && !isTerminated;
    });
  }

  updatePipelineCounts();

  list.sort((a, b) => {
    const na = getNotes(a.id), nb = getNotes(b.id);
    const sa = na.pipelineStatus || '', sb = nb.pipelineStatus || '';
    const pa = na.pipeline || 0,        pb = nb.pipeline || 0;
    const termA = (a.tier === 'REJECT' && pa === 0 && sa === '') || ['rejected','failed-cv','failed-test'].includes(sa);
    const termB = (b.tier === 'REJECT' && pb === 0 && sb === '') || ['rejected','failed-cv','failed-test'].includes(sb);
    // Primary: newest update date first, no-date last
    const dateA = parseUpdateDate(na.updatedAt);
    const dateB = parseUpdateDate(nb.updatedAt);
    if (dateA !== dateB) {
      if (!dateA) return 1;
      if (!dateB) return -1;
      const toMs = s => { const [d,m,y] = s.split('/'); return new Date(+y,+m-1,+d).getTime(); };
      return toMs(dateB) - toMs(dateA);
    }
    // Secondary: terminated last, higher stage first
    if (termA !== termB) return termA ? 1 : -1;
    return pb - pa;
  });

  // Pre-compute date group counts for divider badges
  const _dateGroupCounts = {};
  list.forEach(c => {
    const dk = parseUpdateDate(getNotes(c.id).updatedAt) || 'Chưa cập nhật';
    _dateGroupCounts[dk] = (_dateGroupCounts[dk] || 0) + 1;
  });
  let _lastDateKey;

  list.forEach((c, idx) => {
    const notes = getNotes(c.id);

    // ── Date segment divider ──
    const _dateKey = parseUpdateDate(notes.updatedAt) || 'Chưa cập nhật';
    if (_dateKey !== _lastDateKey) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span class="date-divider-label">Cập nhật ${_dateKey}</span><div class="date-divider-line"></div><span class="date-divider-count">${_dateGroupCounts[_dateKey]} CV</span>`;
      grid.appendChild(div);
      _lastDateKey = _dateKey;
    }

    const hasnotes = hasNotes(c.id);

    const decisionPillMap = {
      proceed: '<span class="decision-pill dp-proceed">Tiến hành</span>',
      reject:  '<span class="decision-pill dp-reject">Từ chối</span>',
      hold:    '<span class="decision-pill dp-hold">Xem xét</span>'
    };
    const decisionPill = decisionPillMap[notes.decision] || '';

    const tierLabelMap = { B: 'Tier B', C: 'Tier C', REJECT: 'Reject' };
    const _pipS = (notes.pipelineStatus || '');
    const _pipN = (notes.pipeline || 0);
    const _isOverrideActive = c.tier === 'REJECT' && _pipN > 0 && !['rejected','failed-cv','failed-test'].includes(_pipS);
    const tierLabel = _isOverrideActive ? 'Override' : tierLabelMap[c.tier];
    const badgeCls  = _isOverrideActive ? 'badge-OVERRIDE' : `badge-${c.tier}`;

    let bars = '';
    if (c.score !== null) {
      bars = `<div class="card-bars">
        ${brow('D1', c.d1, 40, 'bd1')}
        ${brow('D2', c.d2, 30, 'bd2')}
        ${brow('D3', c.d3, 20, 'bd3')}
        ${brow('D4', c.d4, 10, 'bd4')}
        ${brow('Total', c.score, 100, 'btotal')}
      </div>`;
    }

    const hlBlock = c.rejectReason
      ? `<div class="card-rr">${c.rejectReason}</div>`
      : `<div class="card-hl">${c.hl}</div>`;

    const actionMap = {
      interview:           'Phỏng vấn →',
      interview_with_test: 'PV + Bài test →',
      second_look:         'Chi tiết →',
      reject:              'Xem lý do →'
    };
    const actionClsMap = {
      interview:           'btn-interview',
      interview_with_test: 'btn-test',
      second_look:         'btn-second',
      reject:              'btn-reject'
    };

    const isRejectOverridden = c.tier === 'REJECT' && (notes.pipeline > 0 || ['rejected','failed-cv','failed-test'].includes(notes.pipelineStatus || ''));
    const miniStepper  = (c.tier !== 'REJECT' || isRejectOverridden) ? buildMiniStepper(c.id) : '';
    const overrideBtn  = (c.tier === 'REJECT' && !isRejectOverridden)
      ? `<div class="card-actions"><span class="qa-label ql-failed">Auto-reject (HC-01)</span><button class="qa-btn qa-override" onclick="event.stopPropagation();setPipeline('${c.id}',2,'active')" title="Override: gửi bài test dù bị auto-reject">↗ Override</button></div>`
      : '';
    const cardActions  = (c.tier !== 'REJECT' || isRejectOverridden) ? buildCardActions(c.id) : '';

    const pipStatus = notes.pipelineStatus || '';
    const pipStage  = notes.pipeline || 0;
    let pipClass = '';
    if (['rejected','failed-cv','failed-test'].includes(pipStatus)) pipClass = 'pip-terminated';
    else if (pipStage === 5) pipClass = 'pip-offer';
    else if (pipStage >= 3) pipClass = 'pip-advancing';

    const card = document.createElement('div');
    card.className = `card tier-${c.tier}${pipClass ? ' ' + pipClass : ''}`;
    card.onclick = () => openModal(c.id);
    card.innerHTML = `
      <div class="card-hdr">
        <div class="card-identity">
          <div class="card-name">${c.name}</div>
          <div class="card-role">${c.role}</div>
        </div>
        <div class="card-badges">
          <div class="tier-badge ${badgeCls}">
            <span class="badge-dot"></span>${tierLabel}
          </div>
          ${hasnotes ? '<span class="notes-badge">Notes</span>' : ''}
          ${decisionPill}
        </div>
      </div>
      ${bars}${hlBlock}
      <div class="card-footer">
        <div class="score-block">
          ${c.score !== null
            ? `<span class="score-total">${c.score}</span><span class="score-max">/100</span>`
            : `<span class="score-reject-label">Auto-Reject</span>`}
        </div>
        <button class="card-btn ${actionClsMap[c.action]}"
          onclick="event.stopPropagation();openModal('${c.id}')">
          ${actionMap[c.action]}
        </button>
      </div>
      ${miniStepper}${cardActions}${overrideBtn}`;
    grid.appendChild(card);
  });
}

function brow(lbl, val, max, cls) {
  const pct = val != null ? (val / max * 100).toFixed(1) : 0;
  return `<div class="bar-row">
    <span class="bar-lbl">${lbl}</span>
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
    <span class="bar-val">${val != null ? val : '—'}</span>
  </div>`;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id) {
  currentId = id;
  const c = CV.find(x => x.id === id);
  if (!c) return;

  document.getElementById('m-name').textContent = c.name;
  document.getElementById('m-sub').textContent =
    c.score != null
      ? `${c.role} · Tier ${c.tier} · ${c.score}/100`
      : `${c.role} · Auto-Reject`;

  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === 0));

  buildScoreTab(c);
  buildNotesTab(c);
  buildCvPanel(c);
  buildPipelineStepper(id);
  refreshDecisionBadge(getNotes(id).decision);
  document.getElementById('overlay').classList.add('open');
}

function refreshDecisionBadge(decision) {
  const badge = document.getElementById('m-decision-badge');
  const map = {
    proceed: ['Tiến hành tuyển', 'dp-proceed'],
    reject:  ['Từ chối', 'dp-reject'],
    hold:    ['Xem xét lại', 'dp-hold']
  };
  const entry = map[decision];
  badge.innerHTML = entry
    ? `<span class="decision-pill ${entry[1]}" style="font-size:11px;padding:3px 10px">${entry[0]}</span>`
    : '';
}

// ─── TAB 1: SCORE ────────────────────────────────────────────────────────────
function buildScoreTab(c) {
  const el = document.getElementById('tab-score');
  if (c.score === null) {
    el.innerHTML = `
      <div class="reject-overlay">
        <strong>${c.d1 === null ? 'Không thể đánh giá' : 'Auto-Reject'}</strong>
        ${c.rejectReason}<br><br>
        Gửi rejection email trong 2 ngày làm việc.
      </div>
      ${pcHtml(c)}`;
    return;
  }

  const grp = IQ[c.iq];
  const isReject = c.tier === 'REJECT';
  const tierText = c.tier === 'B' ? 'Tier B — Có thể phù hợp'
                 : c.tier === 'C' ? 'Tier C — Chưa phù hợp'
                 : 'REJECT — HC-01 FAIL';
  const groupText = c.iq
    ? `Interview Group ${c.iq}: ${c.iq === 'B' ? 'QA tốt, thiếu domain CK' : 'Domain CK, QA cần train'}`
    : isReject ? 'HC-01 FAIL — Không mời phỏng vấn' : 'Tier C — Không mời phỏng vấn';
  const tnCls = isReject ? 'tn-reject' : 'tn-' + c.tier.toLowerCase();
  const hcHtml = c.hc
    ? '<span class="hc-pass">Pass</span>'
    : '<span class="hc-fail">Fail</span>';

  el.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="sec-title">Score Breakdown</div>
      <div class="score-detail">
        ${dimRow('D1 — Domain Expertise', c.d1, 40, 'bd1', null)}
        ${dimRow('D2 — QA Skills',        c.d2, 30, 'bd2', c.d2s)}
        ${dimRow('D3 — Technical Fit',    c.d3, 20, 'bd3', c.d3s)}
        ${dimRow('D4 — Soft Skills',      c.d4, 10, 'bd4', c.d4s)}
      </div>
      <div class="total-display">
        <div class="total-num ${tnCls}">${c.score}</div>
        <div class="total-info">
          <div class="total-tier">${tierText}</div>
          <div class="total-group">${groupText}</div>
          <div class="total-group" style="margin-top:4px">Hard Criteria: ${hcHtml}</div>
        </div>
      </div>
    </div>
    ${pcHtml(c)}
    ${c.note ? `<div class="note-box">${c.note}</div>` : ''}
    ${grp
      ? `<div style="margin-top:18px">
           <div class="sec-title">${isReject ? 'Câu hỏi screening (nếu xét lại override)' : 'Câu hỏi phỏng vấn'}</div>
           <div class="q-wrap">
             <div class="q-hdr">
               ${grp.label}
               <span class="q-gbadge ${grp.cls}">Group ${c.iq}</span>
             </div>
             ${grp.qs.map((q, i) => `
               <div class="q-item" id="qi-${c.id}-${i}">
                 <div class="q-q" onclick="toggleQ('qi-${c.id}-${i}')">
                   <span>
                     <span class="q-num">${q.q.split('.')[0]}.</span>
                     ${q.q.split('. ').slice(1).join('. ')}
                   </span>
                   <span class="q-arrow">›</span>
                 </div>
                 ${(q.intent || q.pass || q.warn) ? `
                   <div class="q-detail">
                     ${q.intent ? `<div class="q-intent">${q.intent}</div>` : ''}
                     ${q.pass   ? `<div class="q-pass">Pass: ${q.pass}</div>` : ''}
                     ${q.warn   ? `<div class="q-warn">Warn: ${q.warn}</div>` : ''}
                   </div>` : ''}
               </div>`).join('')}
           </div>
         </div>`
      : `<div class="no-interviews">${isReject ? 'REJECT (HC-01 FAIL) — Gửi rejection email trong 2 ngày làm việc.' : 'Ứng viên Tier C — Gửi rejection email trong 2 ngày làm việc.'}</div>`}
    ${isReject && c.rejectReason ? `<div class="reject-overlay" style="margin-top:12px"><strong>Lý do loại</strong>${c.rejectReason}</div>` : ''}`;
}

function pcHtml(c) {
  return `
    <div class="pc-section">
      <div class="sec-title">Ưu điểm & Nhược điểm</div>
      <div class="pc-grid">
        <div class="pc-box pc-pros">
          <div class="pc-title">Điểm mạnh</div>
          <ul class="pc-list pros">${c.pros.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="pc-box pc-cons">
          <div class="pc-title">Điểm cần lưu ý</div>
          <ul class="pc-list cons">${c.cons.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`;
}

function dimRow(lbl, val, max, cls, subs) {
  const pct = (val / max * 100).toFixed(1);
  const subHtml = subs
    ? `<div class="sub-grid">${Object.entries(subs).map(([k, [v, m]]) =>
        `<div class="sub-item"><span>${k}</span><span>${v}/${m}</span></div>`).join('')}</div>`
    : '';
  return `
    <div class="dim-row">
      <div class="dim-hdr">
        <span class="dim-name">${lbl}</span>
        <span class="dim-val">${val}/${max}</span>
      </div>
      <div class="dim-bar">
        <div class="bar-fill ${cls}" style="width:${pct}%"></div>
      </div>
      ${subHtml}
    </div>`;
}

function toggleQ(id) { document.getElementById(id).classList.toggle('open'); }

// ─── RIGHT PANEL: CV ─────────────────────────────────────────────────────────
function buildCvPanel(c) {
  const el = document.getElementById('cv-panel');
  const cvPath = 'CV empoyees/' + c.cvFile;
  const cvUrl = encodeURI(cvPath);
  el.innerHTML = `
    <div class="cv-panel-toolbar">
      <button class="cv-btn cv-open" onclick="window.open('${cvUrl}','_blank')">↗ Mở tab mới</button>
      <a href="${cvUrl}" download="${c.cvFile}" style="text-decoration:none">
        <button class="cv-btn cv-dl">⬇ Tải xuống</button>
      </a>
      <span class="cv-filename">${c.cvFile}</span>
    </div>
    <div class="cv-panel-frame">
      <iframe src="${cvUrl}" title="CV ${c.name}"></iframe>
    </div>
    <div class="cv-panel-note">
      Chrome có thể chặn embedded PDF từ file local. Nếu khung trống, dùng nút
      <strong>Mở tab mới</strong>. Firefox / Safari hiển thị bình thường.
    </div>`;
}

// ─── TAB 3: NOTES ────────────────────────────────────────────────────────────
function buildNotesTab(c) {
  const el = document.getElementById('tab-notes');
  const n = getNotes(c.id);
  el.innerHTML = `
    <div class="notes-form">
      <div class="notes-form-hdr">
        <div class="sec-title" style="margin:0">Ghi chú Phỏng vấn</div>
        <div class="notes-saved" id="n-saved"></div>
      </div>
      ${n.updatedBy ? `<div class="notes-meta">Cập nhật bởi <strong>${n.updatedBy}</strong> · ${parseUpdateDate(n.updatedAt) || ''}</div>` : ''}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ngày phỏng vấn</label>
          <input id="n-date" type="date" class="form-input"
            value="${n.date || ''}" oninput="autoSave()">
        </div>
        <div class="form-group">
          <label class="form-label">Người phỏng vấn</label>
          <input id="n-interviewer" type="text" class="form-input"
            placeholder="Tên interviewer..." value="${n.interviewer || ''}" oninput="autoSave()">
        </div>
      </div>

      <div>
        <div class="form-label" style="margin-bottom:8px">Đánh giá thực tế (1–5 sao)</div>
        <div class="ratings-grid">
          ${starGroup('domain',  'Domain Knowledge',  n.domainScore  || 0)}
          ${starGroup('qa',      'QA Technical',      n.qaScore      || 0)}
          ${starGroup('comm',    'Communication',     n.commScore    || 0)}
          ${starGroup('culture', 'Culture Fit',       n.cultureScore || 0)}
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nhận xét tổng quan</label>
        <textarea id="n-notes" class="form-input" rows="4"
          placeholder="Observations, điểm nổi bật, red flags..."
          oninput="autoSave()">${n.notes || ''}</textarea>
      </div>

      <div class="decision-group">
        <div class="form-label">Quyết định cuối</div>
        <div class="decision-opts">
          <label class="decision-opt proceed${n.decision === 'proceed' ? ' selected' : ''}"
            onclick="selectDecision(this,'proceed')">
            <input type="radio" name="n-dec" value="proceed"> Tiến hành tuyển
          </label>
          <label class="decision-opt hold${n.decision === 'hold' ? ' selected' : ''}"
            onclick="selectDecision(this,'hold')">
            <input type="radio" name="n-dec" value="hold"> Xem xét lại
          </label>
          <label class="decision-opt reject-d${n.decision === 'reject' ? ' selected' : ''}"
            onclick="selectDecision(this,'reject')">
            <input type="radio" name="n-dec" value="reject"> Từ chối
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Action items / Next steps</label>
        <textarea id="n-actions" class="form-input" rows="3"
          placeholder="Gửi bài test, check reference, extend offer..."
          oninput="autoSave()">${n.actionItems || ''}</textarea>
      </div>

      <button class="save-btn" onclick="saveNotes()">Lưu ghi chú</button>
    </div>`;

  document.querySelectorAll('.stars').forEach(sg => {
    sg.querySelectorAll('.star').forEach(s => {
      s.addEventListener('click', () => { setStars(sg, +s.dataset.val); autoSave(); });
      s.addEventListener('mouseenter', () => highlightStars(sg, +s.dataset.val));
      s.addEventListener('mouseleave', () => setStars(sg, +(sg.dataset.current) || 0));
    });
  });
}

function starGroup(dim, label, current) {
  return `<div class="rating-group">
    <div class="rating-label">${label}</div>
    <div class="stars" data-dim="${dim}" data-current="${current}">
      ${[1, 2, 3, 4, 5].map(v =>
        `<span class="star${v <= current ? ' lit' : ''}" data-val="${v}">★</span>`
      ).join('')}
    </div>
  </div>`;
}

function setStars(sg, val) {
  sg.dataset.current = val;
  sg.querySelectorAll('.star').forEach(s => s.classList.toggle('lit', +s.dataset.val <= val));
}

function highlightStars(sg, val) {
  sg.querySelectorAll('.star').forEach(s => s.classList.toggle('lit', +s.dataset.val <= val));
}

function selectDecision(el, val) {
  document.querySelectorAll('.decision-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.val = val;
  autoSave();
}

// ─── FILTER / CLOSE ──────────────────────────────────────────────────────────
function filter(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(f);
}

function filterPipeline(f, btn) {
  currentPipelineFilter = f;
  document.querySelectorAll('.pfb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(currentFilter);
}

function switchTab(name, btn) {
  const tabMap = { score: 0, notes: 1 };
  const idx = tabMap[name];
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function closeOverlay() {
  clearTimeout(saveTimer);
  saveNotes(); // flush any pending unsaved changes before closing
  document.getElementById('overlay').classList.remove('open');
  currentId = null;
}

function closeOnBg(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('qa-theme', next);
  applyTheme(next);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = CV.length;
  const b = CV.filter(c => c.tier === 'B').length;
  const c = CV.filter(c => c.tier === 'C').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-b').textContent = b;
  document.getElementById('stat-c').textContent = c;
  document.getElementById('fc-all').textContent = total;
  document.getElementById('fc-b').textContent = b;
  document.getElementById('fc-c').textContent = c;
}

const savedTheme = localStorage.getItem('qa-theme') || 'light';
applyTheme(savedTheme);
updateStats();

(async () => {
  initUser();
  await loadAllNotes();
  renderCards('all');
  setInterval(syncNotes, 8000);
})();
</script>
</body>
</html>
