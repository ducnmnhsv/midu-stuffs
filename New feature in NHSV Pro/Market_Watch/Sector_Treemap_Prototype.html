<title>Biến động ngành — NHSV Pro Prototype</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #06080f;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}

.device-frame {
  width: 390px;
  min-height: 100vh;
  background: #0b0f1e;
  color: #fff;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px 4px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px 8px;
  min-height: 44px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
}

.back-btn {
  display: none;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  color: #60a5fa;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 8px 4px 0;
  border-radius: 6px;
  white-space: nowrap;
}
.back-btn.visible { display: flex; }

.header-title {
  font-size: 18px;
  font-weight: 700;
  color: #f1f5f9;
  flex: 1;
}

.fullscreen-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #64748b;
  flex-shrink: 0;
}

/* ── Breadcrumb context ── */
.sector-context {
  display: none;
  padding: 0 16px 6px;
  font-size: 12px;
  color: #64748b;
  font-weight: 500;
}
.sector-context.visible { display: block; }
.sector-context .pct { font-weight: 700; }
.sector-context .pct.up { color: #22c55e; }
.sector-context .pct.down { color: #f87171; }

/* ── Tabs ── */
.tabs-wrapper {
  padding: 0 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tabs-wrapper::-webkit-scrollbar { display: none; }

.tabs { display: flex; gap: 6px; }

.tab-btn {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.18s ease;
  background: rgba(255,255,255,0.05);
  color: #64748b;
  letter-spacing: 0.1px;
}
.tab-btn.active {
  background: #1d4ed8;
  color: #fff;
  border-color: transparent;
}
.tab-btn:not(.active):hover {
  background: rgba(255,255,255,0.1);
  color: #94a3b8;
}

/* ── Treemap ── */
.treemap-wrapper {
  flex: 1;
  padding: 0 16px;
}

#treemap {
  width: 100%;
  display: block;
  border-radius: 10px;
  overflow: hidden;
}

.treemap-cell {
  cursor: pointer;
  transition: opacity 0.15s;
}
.treemap-cell:hover rect { opacity: 0.88; }
.treemap-cell:active rect { opacity: 0.7; }

/* ── Legend ── */
.legend {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px 12px;
}
.legend-lbl { font-size: 10px; color: #334155; white-space: nowrap; }
.legend-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, #7f1d1d, #dc2626, #374151, #16a34a, #14532d);
}

/* ── Prototype badge ── */
.proto-badge {
  text-align: center;
  padding: 6px 16px 20px;
  font-size: 10px;
  color: #1e2d47;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── Overlay + Bottom sheet ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }

.bottom-sheet {
  width: 390px;
  background: #131929;
  border-radius: 20px 20px 0 0;
  padding: 0 0 48px;
  max-height: 75vh;
  overflow-y: auto;
  animation: slideUp 0.28s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.sheet-handle {
  width: 36px; height: 4px;
  background: #263352;
  border-radius: 2px;
  margin: 12px auto 0;
}

.sheet-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.sheet-title { font-size: 22px; font-weight: 800; color: #f1f5f9; }
.sheet-subtitle { font-size: 12px; color: #475569; margin-top: 2px; }
.sheet-pct { font-size: 18px; font-weight: 700; padding-top: 4px; }

.sheet-close {
  position: absolute;
  top: 56px; right: 20px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: none; cursor: pointer;
  color: #64748b; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}

.sheet-section {
  margin: 12px 20px 0;
  background: rgba(255,255,255,0.035);
  border-radius: 10px;
  overflow: hidden;
}

.sheet-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;

.sheet-lbl { font-size: 13px; color: #64748b; }
.sheet-val { font-size: 13px; font-weight: 600; color: #e2e8f0; }
</style>

// ================================================================
// SQUARIFIED TREEMAP ALGORITHM
// ================================================================
function squarify(data, x, y, w, h) {
  const total = data.reduce((s, d) => s + d._val, 0);
  if (!total || !w || !h) return [];

  const scale = (w * h) / total;
  const items = [...data]
    .filter(d => d._val > 0)
    .sort((a, b) => b._val - a._val)
    .map(d => ({ ...d, _area: d._val * scale }));

  const out = [];
  _sq(items, x, y, w, h, out);
  return out;
}

function _sq(items, x, y, w, h, out) {
  if (!items.length) return;
  if (items.length === 1) { out.push({ ...items[0], x, y, w, h }); return; }

  let row = [items[0]];
  let i = 1;
  while (i < items.length) {
    const next = [...row, items[i]];
    if (_worst(row, w, h) >= _worst(next, w, h)) { row = next; i++; }
    else break;
  }

  const rowArea = row.reduce((s, d) => s + d._area, 0);
  const isWide = w >= h;
  let cx = x, cy = y;

  if (isWide) {
    const rw = rowArea / h;
    for (const d of row) {
      const rh = d._area / rw;
      out.push({ ...d, x: cx, y: cy, w: rw, h: rh });
      cy += rh;
    }
    _sq(items.slice(row.length), x + rw, y, w - rw, h, out);
  } else {
    const rh = rowArea / w;
    for (const d of row) {
      const rw = d._area / rh;
      out.push({ ...d, x: cx, y: cy, w: rw, h: rh });
      cx += rw;
    }
    _sq(items.slice(row.length), x, y + rh, w, h - rh, out);
  }
}

function _worst(row, w, h) {
  if (!row.length) return Infinity;
  const s = Math.min(w, h);
  const sum = row.reduce((a, d) => a + d._area, 0);
  const mx = Math.max(...row.map(d => d._area));
  const mn = Math.min(...row.map(d => d._area));
  return Math.max((s * s * mx) / (sum * sum), (sum * sum) / (s * s * mn));
}

// ================================================================
// COLOR
// ================================================================
function cellColor(pct, isStock) {
  if (Math.abs(pct) < 0.01) return isStock ? '#b45309' : '#2d3748';
  if (pct > 0) {
    if (pct >= 3) return '#14532d';
    if (pct >= 2) return '#166534';
    if (pct >= 1) return '#15803d';
    return '#16a34a';
  } else {
    if (pct <= -3) return '#7f1d1d';
    if (pct <= -2) return '#991b1b';
    if (pct <= -1) return '#b91c1c';
    return '#dc2626';
  }
}

// ================================================================
// FORMAT HELPERS
// ================================================================
function fmtPct(v) {
  if (v == null) return '—';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}
function fmtNum(v, unit) {
  if (v == null) return '—';
  if (v >= 1000) return (v / 1000).toFixed(1) + 'K ' + unit;
  if (v >= 100) return v.toFixed(0) + ' ' + unit;
  return v.toFixed(1) + ' ' + unit;
}
function clamp(str, maxW, fs) {
  const maxCh = Math.floor(maxW / (fs * 0.6));
  return str.length > maxCh ? str.slice(0, Math.max(1, maxCh - 1)) + '…' : str;
}

// ================================================================
// RENDER TABS
// ================================================================
function renderTabs() {
  const el = document.getElementById('tabsEl');
  el.innerHTML = TABS.map(t =>
    `<button class="tab-btn${t.key === activeTab ? ' active' : ''}" onclick="setTab('${t.key}')">${t.label}</button>`
  ).join('');
}

// ================================================================
// RENDER TREEMAP
// ================================================================
function render() {
  const svg = document.getElementById('treemap');
  const tab = TABS.find(t => t.key === activeTab);
  const field = tab.field;
  const isStock = drillMode;

  const rawData = isStock
    ? (STOCKS[activeSector.sectorId] || []).map(s => ({ ...s, _val: s[field] || 0 }))
    : SECTORS.map(s => ({ ...s, _val: s[field] || 0 }));

  Object.keys(cellMap).forEach(k => delete cellMap[k]);
  const rects = squarify(rawData, 0, 0, SVG_W, SVG_H);

  let html = '';
  for (const r of rects) {
    const rw = Math.max(0, r.w - GAP);
    const rh = Math.max(0, r.h - GAP);
    if (rw < 4 || rh < 4) continue;

    const rx = r.x + GAP / 2;
    const ry = r.y + GAP / 2;
    const cx = rx + rw / 2;
    const cy = ry + rh / 2;
    const color = cellColor(r.perChange, isStock);
    const minDim = Math.min(rw, rh);

    const showLabel = minDim >= 18;
    const showSub   = minDim >= 30 && rh >= 38;

    const fsSec = Math.min(Math.max(9, minDim * 0.17), 15);
    const fsSub = Math.min(Math.max(8, minDim * 0.13), 13);

    const lbY = showSub ? cy - fsSub * 0.7 : cy + fsSec * 0.35;
    const sbY = lbY + fsSec * 0.5 + fsSub * 0.9;

    const label = isStock ? r.stockCode : clamp(r.sectorName, rw - 6, fsSec);
    const sub   = fmtPct(r.perChange);

    const id = isStock ? `s_${r.stockCode}` : `sec_${r.sectorId}`;
    cellMap[id] = r;

    html += `<g class="treemap-cell" onclick="onCell('${id}',${isStock})">
      <rect x="${rx.toFixed(1)}" y="${ry.toFixed(1)}" width="${rw.toFixed(1)}" height="${rh.toFixed(1)}" fill="${color}" rx="3"/>
      ${showLabel ? `<text x="${cx.toFixed(1)}" y="${lbY.toFixed(1)}" text-anchor="middle"
        fill="rgba(255,255,255,0.93)" font-size="${fsSec.toFixed(1)}" font-weight="700"
        font-family="-apple-system,sans-serif" dominant-baseline="middle">${label}</text>` : ''}
      ${showSub ? `<text x="${cx.toFixed(1)}" y="${sbY.toFixed(1)}" text-anchor="middle"
        fill="rgba(255,255,255,0.72)" font-size="${fsSub.toFixed(1)}"
        font-family="-apple-system,sans-serif" dominant-baseline="middle">${sub}</text>` : ''}
    </g>`;
  }
  svg.innerHTML = html;
}

// ================================================================
// CELL CLICK
// ================================================================
function onCell(id, isStock) {
  const d = cellMap[id];
  if (!d) return;
  if (!isStock) drillDown(d);
  else openSheet(d);
}

// ================================================================
// DRILL-DOWN
// ================================================================
function drillDown(sector) {
  activeSector = sector;
  drillMode = true;

  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('backLabel').textContent = 'Ngành';
  document.getElementById('headerTitle').textContent = sector.sectorName;

  const ctx = document.getElementById('sectorCtx');
  const pctCls = sector.perChange >= 0 ? 'up' : 'down';
  ctx.innerHTML = `${sector.sectorName} &nbsp;<span class="pct ${pctCls}">${fmtPct(sector.perChange)}</span>`;
  ctx.classList.add('visible');

  render();
}

function drillUp() {
  drillMode = false;
  activeSector = null;

  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('headerTitle').textContent = 'Biến động ngành';
  document.getElementById('sectorCtx').classList.remove('visible');

  render();
}

// ================================================================
// TAB
// ================================================================
function setTab(key) {
  activeTab = key;
  renderTabs();
  render();
}

// ================================================================
// BOTTOM SHEET — stock detail
// ================================================================
function openSheet(stock) {
  const pctColor = stock.perChange > 0 ? '#22c55e' : stock.perChange < 0 ? '#f87171' : '#f59e0b';
  const tab = TABS.find(t => t.key === activeTab);

  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-header">
      <div>
        <div class="sheet-title">${stock.stockCode}</div>
        <div class="sheet-subtitle">${activeSector?.sectorName || ''}</div>
      </div>
      <div class="sheet-pct" style="color:${pctColor}">${fmtPct(stock.perChange)}</div>
    </div>

    <div class="sheet-section">
      <div class="sheet-row"><span class="sheet-lbl">GTGD</span><span class="sheet-val">${fmtNum(stock.tradingValue,'tỷ')}</span></div>
      <div class="sheet-row"><span class="sheet-lbl">KLGD</span><span class="sheet-val">${fmtNum(stock.tradingVolume,'tr CP')}</span></div>
      <div class="sheet-row"><span class="sheet-lbl">KLNN mua</span><span class="sheet-val">${fmtNum(stock.foreignBuyVolume,'tr CP')}</span></div>
      <div class="sheet-row"><span class="sheet-lbl">KLNN bán</span><span class="sheet-val">${fmtNum(stock.foreignSellVolume,'tr CP')}</span></div>
    </div>

    <div class="sheet-section">
      <div class="sheet-row"><span class="sheet-lbl">Vốn hóa</span><span class="sheet-val">${fmtNum(stock.marketCap,'tỷ')}</span></div>
      <div class="sheet-row"><span class="sheet-lbl">P/E</span><span class="sheet-val">${stock.pe?.toFixed(1) ?? '—'}</span></div>
      <div class="sheet-row"><span class="sheet-lbl">P/B</span><span class="sheet-val">${stock.pb?.toFixed(1) ?? '—'}</span></div>
    </div>

    <div style="padding:12px 20px 0; font-size:11px; color:#334155; text-align:center;">
      Metric hiện tại: <strong style="color:#60a5fa">${tab.label}</strong>
    </div>`;

  document.getElementById('overlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSheet();
}

// ================================================================
// INIT
// ================================================================
renderTabs();
render();
</script>
</body>
</html>
