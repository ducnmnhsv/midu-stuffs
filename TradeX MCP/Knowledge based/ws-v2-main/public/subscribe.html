<!DOCTYPE html>
<html>

<head>
  <title>TechX SocketCluster</title>
  <script type="text/javascript" src="socketcluster.js"></script>
  <script type="text/javascript" src="sc-codec-min-bin.js"></script>
</head>

<body>
  <div class="container">
    <table>
      <tr>
        <td>host</td>
        <td>
          <input id="host"/>
        </td>
        <td>port1</td>
        <td>
          <input id="port" value="8000"/>
        </td>
        <td>
          <input id="path" value="/socketcluster/"/>
        </td>
        <td>
          <input type="checkbox" id="sc_secure" value="checked" />
        </td>
        <!-- <td>port2</td>
        <td>
          <input id="port2" value="8001"/>
        </td> -->
        <td>
          <button onclick="connect()">Connect</button>
          <button onclick="disconnect()">Disconnect</button>
        </td>
      </tr>
      <tr>
        <td>topic</td>
        <td>
          <input id="topic" />
        </td>
        <td>maxChannel</td>
        <td>
          <input id="channel"/>
        </td>
        <td>
          <button onclick="subscribe()">Subscribe</button>
          <button onclick="subscribe(true)">Subscribe With Callback</button>
        </td>

        <td>
          <button onclick="checker()">Checker</button>
        </td>
      </tr>
    </table>
    <table id="myTable">
      <tr>
        <td>Channel</td>
        <td>
          <div id="msg">

          </div>
        </td>
        <!-- <td>Msg2</td> -->
      </tr>
    </table>
  </div>
  <script type="text/javascript">
    // Initiate the connection to the server
    document.addEventListener("DOMContentLoaded", function (event) {
      document.getElementById('host').value = window.location.hostname;
      document.getElementById('port').value = window.location.port;
      const isSecure = window.location.protocol === 'https';
      document.getElementById('path').value = isSecure ? '/ws/socketcluster/' : '/socketcluster/';
      document.getElementById('sc_secure').checked = isSecure;
    });
    var socket1 = null;
    var connect = () => {
      console.log(`connect:`, scCodecMinBin);
      socket1 = socketCluster.connect({
        hostname: document.getElementById('host').value,
        port: document.getElementById('port').value,
        path: document.getElementById('path').value,
        secure: document.getElementById("sc_secure").checked,
        codecEngine: scCodecMinBin,
      });
      socket1.on('error', function (err) {
        console.error(err);
      });

      socket1.on('connect', function () {
        console.log('Socket1 is connected');
      });

      socket1.emit('ping', 'This is a PING message')

    };

    var disconnect = () => {
      socket1.disconnect();
      socket1.destroy();
    };

    function checker(){
      var maxChannel = document.getElementById('channel').value;
      console.log('checker');
      for(let i = 0; i < maxChannel; i++){
        if(parseInt(count1[i]) != parseInt(count2[i]))
          console.log(`checker msg channel: c${i} error`);
      }
      console.log('checker done!!');
    }
    var count1 = [];
    var count2 = [];
    

    function subscribe(cb) {
      // var maxChannel = document.getElementById('channel').value;
      // console.log('start subscribe maxChannel:', maxChannel);
      var channelName = document.getElementById('topic').value;
      if (cb === true) {
        socket1.on(channelName + '.cb', data => console.log('callback', channelName, data));
        socket1.on('market.returnSnapshot', data => console.log('callback', channelName, data));
      }
      subscribeTopic(channelName);
    }

    function subscribeTopic(topic) {
      var tempChannel = socket1.subscribe(topic, {
        data: {
          returnSnapShot: true
        }
      });

      tempChannel.on('subscribeFail', function (err) {
        console.error('Failed to subscribe to the ' + topic + ' due to error: ' + err);
      });
      tempChannel.on('subscribe', function (err) {
        console.log('Success to subscribe to the ' + topic);
      });

      tempChannel.watch(function (data) {
        console.log(JSON.stringify(data));
      });
    }
  </script>
</body>

</html>
