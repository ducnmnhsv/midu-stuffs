<!DOCTYPE html>
<html>
<head>
    <title>Stock Quote</title>
    <script type="text/javascript" src="socketcluster.js"></script>
    <script type="text/javascript" src="sc-codec-min-bin.js"></script>
</head>
<body>
<div class="container">
    <table>
        <tr>
            <td>stock quote count:</td>
            <td><p id='stockQuoteCount'></p></td>
        </tr>
    </table>

    <textarea id="result" cols="80" rows="20"></textarea>

    <div>
        <textarea id="message" cols="80" rows="3"></textarea>
        <button onclick="publish()">Send</button>
    </div>

    <div>
        <button onclick="queryLastStock()">Query Last Stock</button>
    </div>

</div>
<script type="text/javascript">


  var stockQuoteCount = 0;

  // Initiate the connection to the server
  var socket = socketCluster.connect({
    ssl: false,
    port: 8000,
    codecEngine: scCodecMinBin,
  });
  socket.on('error', function (err) {
    console.error(err);
  });

  var channel = null;
  var code = null;
  var channelName = null;

  socket.on('connect', function () {
    // console.log('Socket is connected');
    appendToResult('Socket is connected');

    var urlParams = new URLSearchParams(window.location.search);

    code = urlParams.get('code');
    channelName = 'market.stock.quote';
    if (code != null) {
      channelName = channelName + "." + code;
    }
    appendToResult('subscribe channel: ' + channelName);

    var tempChannel = socket.subscribe(channelName);
    channel = tempChannel;

    tempChannel.on('subscribeFail', function (err) {
      appendToResult('Failed to subscribe to the due to error: ' + err);
    });

    tempChannel.watch(function (data) {
      console.log(data);
      stockQuoteCount++;
      document.getElementById('stockQuoteCount').innerHTML = '' + stockQuoteCount;
    });
  });


  function publish() {
    var text = document.getElementById('message').value;
    console.log(text);
    channel.publish(text, function (err) {
      console.error(err);
    });
  }

  function queryLastStock() {
    socket.emit('queryLastMessage', channelName, (err, data) => {
      if (err) {
        console.error(err);
      }
      console.warn(data);
    })
  }

  function appendToResult(text) {
    document.getElementById('result').value += text + "\n";
  }

  function resetResult() {
    document.getElementById('result').value += "";
  }
</script>
</body>
</html>
