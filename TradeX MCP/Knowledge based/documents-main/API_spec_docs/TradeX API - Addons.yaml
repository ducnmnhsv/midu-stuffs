  /api/v1/aws:
    get:
      tags: 
        - FEEDBACK
        - EKYC
      summary: Create a predefined URL for an image
      description: A predefined URL will be provided for client to attach a image to it (required logging in with demo account)
      security:
        - jwt:
            - jwt       
      parameters: 
        - in: query
          name: serviceName
          schema: 
            type: string
            enum: ['feedback', 'ekyc']
          required: true
          description: Service Name
        - in: query
          name: key
          schema: 
            type: string
          required: true            
          description: >- 
            Name for the file. We recommend to use a unique (hard-to-replicate) name for the predefined URL 
      responses:
        '200': 
          description: >- 
              Predefined URL is generated. 
                
                Client will open the URL in the response, attach an image to it and send the request with PUT method. 
                
                When the status is 200, it means the image is attached to the URL
          content:
            application:
              schema: 
                type: object
      
