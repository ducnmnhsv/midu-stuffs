openapi: 3.0.0
info:
  title: NHSV Add-ons Functions API Specification
  version: 1.0.0
  description: NHSV Add-ons Functions API Specification
servers:
  - url: https://nhsvpro.nhsv.vn/rest
    description: TRADEX API PROD Server
  - url: https://tnhsvpro.nhsv.vn/rest
    description: TRADEX API UAT Server
components:
  securitySchemes:
    jwt:
      type: apiKey
      in: header
      name: Authorization
paths:
  /api/v1/copyTrading/marketLeader/profile/{marketLeaderId}:     
    get: 
      tags:
        - COPY TRADING
      summary: Query Market Leader Profile
      description: Market Leader Profile
      security:
        - jwt:
            - jwt
      parameters:
        - in: path
          name: marketLeaderId
          schema:
            type: number
          description: Market Leader ID
          required: true
      responses:
        '200':
          description: Query Market Leader Profile Successfully
          content:    
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: object
                    properties:
                      marketLeaderId: 
                        type: number
                        description: Market leader’s ID
                      username: 
                        type: string
                        description: Market leader’s username
                      fullname: 
                        type: string
                        description: Market leader’s username
                      introduction:
                        type: string
                        description: Market leader’s introduction
                      imageUrl:
                        type: string
                        description: imageUrl
                      email:
                        type: string
                        description: Market leader’s email
                      activatedAt:
                        type: string
                        description: 'Activated Date and Time (format: dd/mm/yyyy hh:mm:ss)'
                      status:
                        type: string
                        description: status (ACTIVE/INACTIVE)
                      deactivatedAt:
                        type: string
                        description: 'Deactivated Date and Time (format: dd/mm/yyyy hh:mm:ss)'
                      deactivatedBy: 
                        type: string
                        description: The person who deactivates account
                      invitedBy:
                        type: string
                        description: The person who invites NHSV user to create Market Leader Account
                      totalSubscribers: 
                        type: number
                        description: Total subscribers of the Market Leader
                      profitLossRatio: 
                        type: number
                        description: Market Leader's this month profit loss
                  pageData: 
                      type: number
                      description: Page number 
                    
  /api/v1/copyTrading/marketLeader/currentPortfolio:
    get:
      tags:
        - COPY TRADING
      summary: Query Market Leader's Current Portfolio
      description: Market Leader's Current Portfolio
      security:
        - jwt:
            - jwt
      parameters:
        - in: query
          name: marketLeaderId
          schema: 
            type: number
          required: true
          description: Market Leader ID
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page (default is 0)
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page (default is 20)
      responses:
        '200':
          description: Query Market Leader's Current Portfolio Successfully 
          content: 
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: object
                    properties:
                      uploadedDateTime:
                        type: string
                        description: dd/mm/yyyy hh:mm:ss 
                      currentPortfolio:
                        type: array
                        items:
                          type: object
                          properties:
                            stockCode:
                              type: string
                              description: Stock code
                            stockWeight: 
                              type: number
                              description: stock weight of that stockCode  
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements
        '400':
          description: Bad Request
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: ["INVALID_MARKET_LEADER_ID", "MARKET_LEADER_ID_IS_REQUIRED"]        
                    description: error message
                  params:
                    type: array
                    items:
                      type: string
                  messageParams:
                    type: array
                    items:
                      type: string   
                    
  /api/v1/copyTrading/marketLeader/historicalPortfolio:
    get:
      tags:
        - COPY TRADING
      summary: Query Market Leader's Historical Portfolio
      description: Market Leader's Historical Portfolio
      security:
        - jwt:
            - jwt    
      parameters: 
        - in: query 
          name: marketLeaderId
          schema: 
            type: number
          description: Market Leader ID
        - in: query
          name: fromDate
          schema: 
            type: string
          description: 'Start date (format: yyyymmdd)'
        - in: query
          name: toDate
          schema: 
            type: string
          description: 'End date (format: yyyymmdd'
        - in: query
          name: sortAsc
          schema: 
            type: boolean
          description: 'sorting option (true: default)'
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page
      responses:
        '200':
          description: Query ML's Historical Portfolio Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: array
                    items: 
                      type: object
                      properties:
                        uploadedDateTime:
                          type: string
                          description: dd/mm/yyyy hh:mm:ss 
                        portfolioId:
                          type: number 
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements
 
                          
        '400':
          description: Bad Request
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum: ["MARKET_LEADER_ID_IS_REQUIRED", "INVALID_MARKET_LEADER_ID", "INACTIVE_MARKET_LEADER_ID"]          
                    description: error message
                  params:
                    type: array
                    items:
                      type: string
                  messageParams:
                    type: array
                    items:
                      type: string         
                      
  /api/v1/copyTrading/marketLeader/dailyProfitLossRatio:
    get: 
      tags:
        - COPY TRADING
      summary: Query Market Leader's Daily Profit/Loss Ratio
      description: Market Leader's Daily Profit/Loss Ratio
      security:
        - jwt:
            - jwt    
      parameters: 
        - in: query 
          name: marketLeaderId
          schema: 
            type: array
            items: 
             enum: [ID of Market leader(s) ]
          description: Market Leader ID
        - in: query
          name: fromDate
          schema: 
            type: string
          description: 'Start date (format: yyyymmdd)'
        - in: query
          name: toDate
          schema: 
            type: string
          description: 'End date (format: yyyymmdd)'
        - in: query
          name: sortAsc
          schema: 
            type: boolean
          description: 'sorting option (true: default)'
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page    
      responses:
        '200':
          description: Query Market Leader's Daily Profit/Loss Ratio Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: object
                    properties:
                      beMarketLeaderDate:
                        type: string
                        description: The date NHSV users become Market Leader (dd/mm/yyyy)
                      marketLeaderId: 
                        type: number
                        description: Market leader ID 
                      items: 
                        type: array 
                        items: 
                          type: object
                          properties:
                            reportedDate: 
                              type: string
                              description: Reported date 
                            profitLossRatio: 
                              type: number 
                              description: Market leader's profit loss
                            normalisedNAV: 
                              type: number
                              description: Normalised value of NAV
                                
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements
                        

  /api/v1/copyTrading/subscriber/subscribe:
    post:
      tags:
        - COPY TRADING
      summary: Subscribe Copy Trading Service
      security:
        - jwt:
            - jwt        
      requestBody:
        content:
          application/json:
            schema: 
              type: object
              properties: 
                username:
                  type: string
                  description: NHSV user’s username
                accountNumber:
                  type: string
                  description: NHSV user’s account number
                subNumber:
                  type: string
                  description: NHSV's normal sub account number
                marketLeaderId:
                  type: number
                  description: Market Leader whom NHSV user wants to copy
                orderSetType:
                  type: string
                  enum: ['QUICK_MATCH', 'SAFE_MATCH']
                allocatedRatio:
                  type: number
                  description: Allocated ratio which NHSV user wants to spend for Copy Trading Service (0 < allocatedRatio < 1)

      responses:
        '200':
          description: Subscribe Market Leader Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  message:
                    type: string
                    enum: ['COPY_TRADE_SUBSCRIBE_SUCCESS']
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties: 
                  code:
                    type: string
                    enum: ['INVALID_USERNAME', 'INVALID_ACCOUNT_NUMBER', 'INVALID_SUB_NUMBER', 'INVALID_MARKET_LEADER', 'SUB_NUMBER_HAS_BEEN_SUBSCRIBED_BEFORE', 'USERNAME_IS_REQUIRED', 'ACCOUNT_NUMBER_IS_REQUIRED', 'SUB_NUMBER_IS_REQUIRED', 'MARKET_LEADER_ID_IS_REQUIRED', 'CAN_NOT_SUBSCRIBE_COPY_TRADING_BY_MARGIN_SUB_NUMBER', 'ORDER_SET_TYPE_IS_REQUIRED', 'ALLOCATED_RATIO_IS_REQUIRED', 'INVALID_ORDER_SET_TYPE']
                  params: 
                    type: array
                    items: 
                      type: string
                  messageParams: 
                    type: array
                    items: 
                      type: string 

    delete:
      tags:
        - COPY TRADING
      summary: Unsubscribe Copy Trading Service
      security:
        - jwt:
            - jwt        
      parameters:
        - in: query
          name: username
          schema: 
            type: string
          required: true
          description: NHSV user’s username
        - in: query
          name: accountNumber
          schema: 
            type: string
          required: true            
          description: NHSV user’s account number
        - in: query
          name: subNumber
          schema: 
            type: string
          required: true            
          description: NHSV's normal sub account number

      responses:
        '200':
          description: Unsubscribe Market Leader Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  message:
                    type: string
                    enum: ['COPY_TRADE_UNSUBSCRIBE_SUCCESS'] 
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties: 
                  code:
                    type: string
                    enum: ['INVALID_USERNAME', 'INVALID_ACCOUNT_NUMBER', 'INVALID_SUB_NUMBER',  'SUB_NUMBER_HAS_BEEN_UNSUBSCRIBED_BEFORE', 'USERNAME_IS_REQUIRED', 'ACCOUNT_NUMBER_IS_REQUIRED', 'SUB_NUMBER_IS_REQUIRED']
                  params: 
                    type: array
                    items: 
                      type: string
                  messageParams: 
                    type: array
                    items: 
                      type: string                     
          
  /api/v1/copyTrading/marketLeader/list:
    get: 
      tags:
        - COPY TRADING
      summary: Query List Of Market Leader By Period/ List Of All Active Market Leader 
      security:
        - jwt:
            - jwt            
      parameters: 
        - in: query 
          name: search
          schema: 
            type: string
          description: List of selected Market Leader(s)
        - in: query
          name: period
          schema: 
            type: string
            enum: ['DAY', 'WEEK', 'MONTH', 'YEAR', 'ALL']
          description: period option 
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page    
      responses:
        '200':
          description: Query List Of Market Leader By Period/ List Of All Active Market Leader Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: array 
                    items: 
                      type: object
                      properties:
                        marketLeaderId:
                          type: number
                          description: Market Leader ID
                        username:
                          type: string
                          description: Market Leader Username
                        fullname:
                          type: string
                          description: Market Leader Fullname 
                        imageUrl:
                          type: string
                          description: Market Leader Avatar
                        profitLossRatio:
                          type: number 
                          description: Market Leader Profit Ratio In Selected Period 
                        totalSubscribers: 
                          type: number 
                          description: Total Subscribers
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements  
                        
  /api/v1/copyTrading/marketLeader/subscriberGrowthRate:
    get: 
      tags:
        - COPY TRADING
      summary: Query Market Leader's Subscriber Growth rate
      security:
        - jwt:
            - jwt    
      parameters: 
        - in: query 
          name: marketLeaderId
          schema: 
            type: number
          description: Market Leader ID
        - in: query
          name: fromDate
          schema: 
            type: string
          description: 'Start date (format: yyyymmdd)'
        - in: query
          name: toDate
          schema: 
            type: string
          description: 'End date (format: yyyymmdd'
        - in: query
          name: sortAsc
          schema: 
            type: boolean
          description: 'sorting option (true: default)'
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page

      responses:
        '200':
          description: Query Periodic Profit/Loss Ratio of Market Leader's portfolio Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  beMarketLeaderDate:
                    type: string
                    description: The date NHSV users become Market Leader (yyyymmdd)
                  data:
                    type: array 
                    items: 
                      type: object
                      properties:
                        date:
                          type: string
                          description: yyyymmdd
                        totalSubscribers:
                          type: number
                          description: Total SUBSCRIBING subscribers
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements  
                        
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties: 
                  code:
                    type: string
                    enum: ['MARKET_LEADER_ID_IS_REQUIRED', 'INVALID_MARKET_LEADER_ID']
                  params: 
                    type: array
                    items: 
                      type: string
                  messageParams: 
                    type: array
                    items: 
                      type: string            
      
  /api/v1/copyTrading/subscriber/subscriberInformation:
    get:
      tags: 
        - COPY TRADING
      summary:   Query My Copy Trading information
      security:
        - jwt:
            - jwt        
      parameters:
        - in: query
          name: accountNumber
          schema: 
            type: string
          description: NHSV user’s account number
        - in: query
          name: subNumber
          schema: 
            type: string
          description: NHSV user’s subNumber
        - in: query
          name: copyTradingStatus
          schema: 
            type: string
            enum: ['SUBSCRIBE', 'UNSUBSCRIBE']
          description: status
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page
        - in: query
          name: sortAsc
          schema: 
            type: boolean
          description: To get data ordered by ASC/DESC (default is true)
      responses:
        '200':
          description: Query Subscription Information 
          content:
            application/json:
              schema:
                type: object
                properties: 
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: array 
                    items: 
                      type: object
                      properties:
                        username:
                          type: string
                          description: NHSV user’s username
                        accountNumber:
                          type: string
                          description: NHSV subscriber’s account number
                        subNumber:
                          type: string
                          description: NHSV subscriber’s sub number
                        marketLeaderInfo: 
                          type: object 
                          properties: 
                            marketLeaderId:
                              type: number
                              description: Market Leader ID
                            marketLeaderUsername:
                              type: string
                              description: Market Leader’s username     
                            marketLeaderFullname:
                              type: string
                              description: Market Leader’s fullname
                            marketLeaderImageUrl:
                              type: string
                              description: Market Leader’s avatar
                            marketLeaderStatus:
                              type: string
                              enum: ['ACTIVE', 'INACTIVE']
                              description: status
                            profitLossRatio: 
                              type: number
                              description: Market Leader's this month profit loss 
                            totalSubscribers: 
                              type: number 
                              description: Market Leader's total subscriber
                        subscribedDateTime:
                          type: string
                          description: dd/mm/yyyy hh:mm:ss
                        unsubscribedDateTime:  
                          type: string
                          description: >-
                            dd/mm/yyyy hh:mm:ss  
                            
                            - If status = SUBSCRIBE, the system does not show this field
                        copyTradingStatus:
                          type: string
                          description: status 
                          enum: ['SUBSCRIBE', 'UNSUBSCRIBE']                 
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements  
                                  
  
  /api/v1/copyTrading/marketLeader/historicalPortfolio/allStocks: 
    get: 
      tags:
        - COPY TRADING
      summary:   Query all stock codes in Market Leader's portfolio
      security:
        - jwt:
            - jwt        
      parameters:
        - in: query
          name: portfolioId
          schema: 
            type: number
          description: Market Leader’s portfolio ID
          required: true
        - in: query
          name: pageNumber
          schema: 
            type: number
          description: The number of the specific page
        - in: query
          name: pageSize
          schema: 
            type: number
          description: The number of records on one page
      responses:
        '200':
          description: Query all stock codes in Market Leader's portfolio Successfully
          content:
            application/json:
              schema:
                type: object
                properties: 
                  timestamp:
                    type: string
                    description: timestamp
                  status:
                    type: number
                    description: status
                  message:
                    type: string
                    description: message
                  data:
                    type: object
                    properties: 
                      marketLeaderId: 
                        type: number
                        description: portfolioId's Market Leader's ID
                      portfolioId:  
                        type: number
                        description: Selected portfolio ID
                      allStockCodes: 
                        type: array 
                        items: 
                          type: object
                          properties:
                            stockCode:
                              type: string
                              description: Stock Code
                            stockWeight:
                              type: number
                              description: Stock Weight
                  pageData:
                    type: object
                    properties:
                      pageSize:
                        type: number
                        description: The number of records on one page
                      pageNumber:
                        type: number
                        description: The number of the specific page
                      totalElements:
                        type: number
                        description: total stock codes in Market Leader’s portfolio
                      totalPages:
                        type: number
                        description: total pages based on pageNumber, pageSize and totalElements  
                        
  /api/v1/favorite/watchlist:
    post: 
      tags:
        - WATCHLIST
      summary: Create Watchlist
      security:
        - jwt:
            - jwt         
      requestBody: 
        content:
          application/json:
            schema: 
              type: object
              properties: 
                watchlistName:  
                  type: string
                  description: watchlist name
              required: 
                - watchListName
      responses: 
        '200': 
          description: Create Watchlist Successfully
          content:
            application:
              schema: 
                type: object
                properties: 
                  message: 
                    type: string
                    enum: ['WATCHLIST_CREATE_SUCCESS']
                  watchlistId: 
                    type: string
                    description: newly created watchlist's ID
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties: 
                  code:
                    type: string
                    enum: ['WATCHLIST_NAME_EXIST','MAX_20_WATCHLISTS']
                  params: 
                    type: array
                    items: 
                      type: string
                  messageParams: 
                    type: array
                    items: 
                      type: string           
                      
    get: 
      tags:
        - WATCHLIST
      summary: Query List of Watchlists
      security:
        - jwt:
            - jwt     
      responses: 
        '200': 
          description: Query List of Watchlists Successfully
          content:
            application:
              schema: 
                type: array
                items:
                  type: object
                  properties: 
                    watchlistId: 
                      type: string
                      description: watchlist ID  
                    watchlistName: 
                      type: string
                      description: name of watchlistId
                    numberOfStocks: 
                      type: number
                      description: number of stocks in watchlist
                      
    put: 
      tags: 
        - WATCHLIST
      summary: Edit Watchlist Name
      security:
        - jwt:
            - jwt         
      requestBody: 
        content:
          application/json:
            schema: 
              type: object
              properties: 
                watchlistId:
                  type: string
                  description: watchlist ID
                watchlistName:  
                  type: string
                  description: new name of watchlist
              required: 
                - watchlistId
                - watchlistName
      responses: 
        '200': 
          description: Edit Watchlist Name Successfully
          content:
            application:
              schema: 
                type: object
                properties: 
                  message: 
                    type: string
                    enum: ['WATCHLIST_MODIFY_SUCCESS']
                  watchlistId: 
                    type: number
                    description: watchlist's ID
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties: 
                  code:
                    type: string
                    enum: ['WATCHLIST_NAME_EXIST']
                  params: 
                    type: array
                    items: 
                      type: string
                  messageParams: 
                    type: array
                    items: 
                      type: string    

    delete: 
      tags:
        - WATCHLIST
      summary: Delete Watchlist
      security:
        - jwt:
            - jwt   
      parameters:
        - in: query
          name: watchlistId
          schema: 
