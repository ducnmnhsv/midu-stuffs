                                    example: HDMTK-20241124/001
                                  createdDate: 
                                    type: string
                                    example: 27/12/2023
                                  submittedFrom: 
                                    type: string
                                    example: /1899/5511
                              webView: 
                                type: object
                                properties: 
                                  url: 
