  /api/v1/ekyc-admin/sendOtp:
    post:
      tags: 
        - EKYC
      summary: Trigger sending OTP
      description: Send OTP to input phone number (required logging in with demo account)
      security:
        - jwt:
            - jwt         
      requestBody: 
        content:
          application/json:
            schema: 
              type: object
              properties: 
                id:
                  type: string
                  example: "+849198139801"
                  description: phone number
                idType: 
                  type: string
                  enum: ["PHONE_NO"]
                txType: 
                  type: string
                  enum: ["E_KYC"]
              required: 
                - id
                - idType
                - txType
      responses:
        '200':
          description: Send OTP successfully
          content: 
            application/json:
              schema: 
                type: object
                properties: 
                  otpId: 
                    type: string
                    example: "bbc40183-fc8c-4642-a884-7224da9f3387"
                  expiredTime: 
                    type: string
                    example: "20231031100058"
        '400':
          description: Bad Request
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: error message
                    enum: ["PHONENO_LOCK_INCORRECT_OTP_MAX"]
                    example: PHONENO_LOCK_INCORRECT_OTP_MAX
                  params:
                    type: array
                    items:
                      type: string
                  messageParams:
                    type: array
                    items:
                      type: string   

  /api/v1/ekyc-admin/verifyOtp:
    post:
      tags:
        - EKYC
      summary: Verify OTP
      description: Verify OTP (required logging in with demo account)
      security:
        - jwt:
            - jwt         
      requestBody: 
        content:
          application/json:
            schema: 
              type: object
              properties: 
                otpId:
                  type: string
                  example: "bbc40183-fc8c-4642-a884-7224da9f3387"
                  description: otpId from API POST /api/v1/ekyc-admin/sendOtp
                otpValue: 
                  type: string
                  example: "123456"
                  description: 6-digit OTP sent to phone number
              required: 
                - otpValue
                - otpId
      responses:
        '200':
          description: Verify OTP successfully
          content: 
            application/json:
              schema: 
                type: object
                properties: 
                  otpKey: 
                    type: string
                    example: "lạksd-alkjdlakjc-123091283i"
                  expiredTime: 
                    type: string
                    example: "20231031100058"
        '400':
          description: Bad Request
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: error message
                    enum: ["INCORRECT_OTP", "OTP_EXPIRED", "INCORRECT_OTP_MAX"]
