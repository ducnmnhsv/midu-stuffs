  /api/v1/equity/account/notification:
    get:
      tags:
        - NOTIFICATION
      summary: Query Account's Notification List
      security:
        - jwt:
            - jwt 
      parameters:
        - in: query
          name: subAccount
          schema: 
            type: string
            description: subaccount
          required: true
        - in: query
          name: fromDate
          schema: 
            type: string
            description: querying starting date (format yyyymmdd, default is the current date)
          required: false
        - in: query
          name: toDate
          schema: 
            type: string
            description: querying end date (format yyyymmdd, default is the current date)
          required: false
        - in: query
          name: nextKey
          schema: 
            type: string
            description: using the last nextKey API returns from the previous request to query the next one
          required: false
      responses:
        '200':
          description: Query notification list successfully
          content: 
            application/json:
              schema: 
                type: array
                items: 
                  type: object
                  properties: 
                    seq:
                      type: string
                      description: sequence number
                    sendDateTime:
                      type: string
                      description: date and time notification is sent (format yyyymmdd hh:mm:ss)
                    author:
                      type: string
                      description: sender
                    title:
                      type: string
                      description: title
                    shortTitle:
                      type: string
                      description: brief title
                    content:
                      type: string
                      description: full content
                    shortContent:
                      type: string
                      description: brief content
                    nextKey:
                      type: string
                      description: used for next querying
        '400':
          description: Bad Request
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: error message
                  params:
                    type: array
                    items:
                      type: string
                  messageParams:
                    type: array
                    items:
                      type: string     
                      
