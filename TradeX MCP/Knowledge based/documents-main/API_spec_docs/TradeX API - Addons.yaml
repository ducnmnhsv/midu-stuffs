                                    example: https://demo.econtract.fpt.com/app/fi-wv/000010n0ir90tbpQBALGGuVko/p_002_r_001/act
                                  cookieName: 
                                    type: string
                                    example: jwttoken_000010n0ir90tbpQBALGGuVko_p_002_r_001
                                  cookieValue: 
                                    type: string
                                    example: eyJhbGciOiJIUzUxMiJ9..IeCS-BZ-BX9ialJdN4Sr_GdT1lOQ0sLx1jA_rVY20tENkqXuraw4lJlcrytdYoexVwcRWPfJWhjsFqKl0iyzlg
                                  expireIn: 
