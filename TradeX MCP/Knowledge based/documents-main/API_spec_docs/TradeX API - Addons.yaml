  /api/v1/lotte/ekycs:
    post: 
      tags: 
        - EKYC
      summary: Update information in eKYC application number
      description: To complete opening new account process (required logging in with demo account grant_type=client_credentials)
      security: 
        - jwt:
            - jwt 
      requestBody: 
        content:
          application/json:
            schema: 
              type: object
              properties: 
                deviceUniqueId:
                  type: string
                eKycId:
                  type: string
                  example: 123
                  description: >- 
                    eKycId gotten from post: /api/v1/lotte/ekycs/create
                email: 
                  type: string
                  example: abc@ekyc.com
                  description: email address
                phoneNo:
                  type: string
                  example: 0944040899
                  description: phoneNo was verified and input in post:/api/v1/lotte/ekycs/create
                fullName: 
                  type: string
                  example: Nguyễn Văn A
                  description: fullname
                identifierId: 
                  type: string
                  example: 0980989818273
                  description: CCCD/CMND (Must validate existence using post:/api/v1/equity/account/checkNationalId)
                birthDay: 
                  type: string
                  example: 19900101
                  description: date of birth
                gender: 
                  type: string
                  example: Male
                  enum: ["Male", "Female"]
                  description: Gender 
                issueDate: 
                  type: string
                  example: 20170101
                  description: CCCD/CMND's Issued Date
                issuePlace: 
                  type: string
                  example: CỤC CẢNH SÁT QUẢN LÝ HÀNH CHÍNH VỀ TRẬT TỰ XÃ HỘI
                  description: CCCD/CMND's Issued Place
                permanentAddress: 
                  type: string
                  example: Hà Nội, Viêt Nam
                  description: Địa chỉ thường trú
                contactAddress: 
                  type: string
                  example: Hà Nội, Viêt Nam
                  description: Địa chỉ liên hệ 
                branch: 
                  type: string
                  example: 500
                  description: NHSV's Branch (got from API GET:/api/v1/ekycs/branch)
                marginInclued: 
                  type: boolean
                  example: true
                  description: Do you want to open Margin Account? 
                onlineTrading: 
                  type: boolean
                  example: true
                  description: Do you want to trade via Internet?
                authenMethod: 
                  type: string
                  example: otp
                  description: Authentication method 
                  enum: ["otp", "token"]
                otpReceiveMethod: 
                  type: string
                  example: email
                  description: OTP Card receiving method
                  enum: ["email", "express"]
                advancedCashIncluded: 
                  type: boolean
                  example: true
                  description: Do you want to register Cash In Advanced?
                smsMethod: 
                  type: string
                  example: string
                  description: SMS Notification type
                  enum: ["basic", "advanced"]                  
                emailNotification: 
                  type: boolean
                  example: true
                  description: Do you want to receive notification via email?
                bankList:
                  type: array
                  description: Bank List (must have at least 1 object and max is 3)
                  items: 
                    type: object
                    properties: 
                      bankId:
                        type: string
                        example: "0202"
                        description: Bank ID (gotten from bankCode of API GET /api/v1/ekycs/banks)
                      bankName:
                        type: string
                        example: "BIDV"
                        description: Bank's short name
                      bankAccNo:
                        type: string
                        example: "09940408291282"
                        description: Bank Account Number
                      ownerName:
                        type: string
                        example: "Nguyễn Văn A"
                        description: Name of Bank's Owner
                      branchId: 
                        type: string
                        example: "01202001"
                        description: bankId's branchID (gotten from API GET /api/v1/ekycs/banks/:id/branches)
                referral: 
                  type: string
                  example: 1
                  description: >- 
                    referral type:
                      - 1: Nhân viên/CTV
                      - 2: Khách hàng
                      - 3: Quảng cáo
                      - 4: Khác 
                  enum: ["1", "2", "3", "4"]
                partnerId: 
                  type: string
                  example: "bangdn"
                  description: >- 
                    referral ID:
                      - referral =  1: Nhân viên/CTV -> partnerId = NHSV staff (bắt buộc phải xác thực ID này bằng API post:/api/v1/ekycs/partner và dùng name API trả về để fill vào trường partnerName)
                      - referral = 2: Khách hàng -> partnerId = CCCD của Khách hàng đó (partnerName truyền sẽ là CCCD của Khách hàng đó)
                      - referral = 3: Quảng cáo -> partnerId người dùng tự điền (partnerId và partnerName đều là giá trị tự điền)
                      - referral = 4: Khác  -> partnerId người dùng tự điền (partnerId và partnerName đều là giá trị tự điền)
                partnerName: 
                  type: string
                  example: Đinh Ngọc Bằng
                  description: >- 
                    referral ID:
                      - referral =  1: Nhân viên/CTV -> partnerId = NHSV staff (bắt buộc phải xác thực ID này bằng API post:/api/v1/ekycs/partner và dùng name API trả về để fill vào trường partnerName)
                      - referral = 2: Khách hàng -> partnerId = CCCD của Khách hàng đó (partnerName truyền sẽ là CCCD của Khách hàng đó)
                      - referral = 3: Quảng cáo -> partnerId người dùng tự điền (partnerId và partnerName đều là giá trị tự điền)
                      - referral = 4: Khác  -> partnerId người dùng tự điền (partnerId và partnerName đều là giá trị tự điền)     
                customerSupport: 
                  type: boolean
                  example: true
                  description: Do you have a personal customer support staff? 
                csPartnerId: 
                  type: string
                  example: "bangdn"
                  description: >- 
                      - Required if customerSupport = true and must input a value (empty value is not allowed)
                      
                      - Optional if customerSupport = false
                csName: 
                  type: string
                  example: Đinh Ngọc Bằng
                  description: >- 
                      - Required if customerSupport = true and must input a value (empty value is not allowed)
                      
                      - Optional if customerSupport = false                  
                backImageUrl: 
                  type: string
                  example: "https://file.nhsv-dev.tradex.vn/ekyc-images/back_image.jpg"
                  description: ID's back image
                frontImageUrl: 
                  type: string
                  example: "https://file.nhsv-dev.tradex.vn/ekyc-images/front_image.jpg"
                  description: ID's front image
                portraitImageUrl: 
                  type: string
                  example: "https://file.nhsv-dev.tradex.vn/ekyc-images/portrait_image.jpg"
                  description: customer's portrait image                  
                matchingRate: 
                  type: string
                  example: 99.99
                  description: >- 
                    VNPT's eKYC score. API returns error if matchingRate < 80 (80 is adjustable)
                fatca: 
                  type: boolean
                  description: Are you the one who needs to comply with FATCA (Foreign Account Tax Compliance Act)? 
                taxNo: 
                  type: string
                  example: 123123
                  description: tax number
                dataSign:
                  type: string
                  description: dataSign từ INFO_RESULT của VNPT
                dataBase64: 
                  type: string
                  description: dataBase64từ INFO_RESULT của VNPT
                beneficiaryOwner: 
                  type: object
                  required: 
                    - fullName
                    - birthDay
                    - nationality
                    - identifierId
                    - issueDate
                    - issuePlace
                    - permanentAddress
                    - contactAddress
                    - occupation
                    - position
                    - phoneNumber
                    - visaNo
                    - visaIssuePlace
                  properties: 
                    fullName: 
                      type: string
                      example: Nguyễn Văn A
                    birthDay: 
                      type: string
                      example: 19900101
                    nationality: 
                      type: string
                      example: Việt Name
                    identifierId: 
                      type: string
                      example: 001090010101
                    issueDate: 
                      type: string
                      example: 20220101
                    issuePlace: 
                      type: string
                      example: CỤC CẢNH SÁT QUẢN LÝ HÀNH CHÍNH VỀ TRẬT TỰ XÃ HỘI
                    permanentAddress: 
                      type: string
                      example: Thành phố HCM Việt Nam
                    contactAddress: 
                      type: string
                      example: Thành phố HCM Việt Nam
                    occupation: 
                      type: string
                      example: abc
                    position: 
                      type: string
                      example: xyz
                    phoneNumber: 
                      type: string
                      example: 090119900101
                    visaNo: 
                      type: string
                      example: C19900101
                    visaIssuePlace: 
                      type: string
                      example: Việt Nam
                    foreignResidence: 
                      type: string
                      example: Raymond Street Eastwood NSW 2122 Australia
                investmentExperience: 
                  required: 
                    - investmentGoal
                    - risk
                    - experienced
                  type: object
                  properties: 
                    investmentGoal: 
                      type: string
                      example: 'long_term'
                      enum: ["long_term","mid_term","short_term"]
                    risk: 
                      type: string
                      example: low
                      enum: ["high","normal","low"]                      
                    experienced: 
                      type: boolean
                    publicCoop: 
                      description: max 2 (Tên công ty đại chúng mà Khách hàng là người nội bộ hoặc người có liên quan của người nội bộ)
                      type: array
                      items: 
                        type: object
                        required:
                          - companyName
                          - stock
                          - position
                        properties: 
                          companyName: 
                            type: string
                            example: publicCoop1
                          stock: 
                            type: string
                            example: PC1
                          position: 
                            type: string
                            example: Director
                    blockholder: 
                      description: max 2 (Tên công ty đại chúng mà Khách hàng sở hữu từ 5% trở lên số cổ phiếu có quyền biểu quyết)
                      type: array
                      items: 
                        type: object
                        required:
                          - companyName
                          - stock
                          - position                        
                        properties: 
                          companyName: 
                            type: string
                            example: blockholder1
                          stock: 
                            type: string
                            example: BH1
                          position: 
                            type: string
                            example: Consultant
              required: 
                - deviceUniqueId
                - eKycId
                - email
                - phoneNo
                - fullName
                - identifierId
                - birthDay
                - gender
                - issueDate
                - issuePlace
                - permanentAddress
                - contactAddress
                - branch
                - marginInclued
                - onlineTrading
                - authenMethod
                - otpReceiveMethod
                - advancedCashIncluded
                - smsMethod
                - emailNotification
                - bankList
                - referral
                - partnerId
                - partnerName
                - customerSupport
                - backImageUrl
                - frontImageUrl
                - matchingRate
                - fatca
                - dataSign
                - dataBase64
      responses:
        '200':
          description: Register eKYC successfully
          content: 
            application/json:
              schema: 
                type: object
                properties: 
                  status: 
                    type: string
                    example: "success"
        '400':
          description: Bad Request
          content: 
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: error message
                    example: "INVALID_PARAMETERS"
                  params:
                    type: array
                    items:
                      type: string
                  messageParams:
                    type: array
                    items:
                      type: string
                      
