# Create Account
email.createAccount.subject = [NHSV] THÔNG BÁO MỞ TÀI KHOẢN THÀNH CÔNG
email.createAccount.text1 = Kính gửi Quý khách hàng: {0}
email.createAccount.text2 = Chào mừng Quý khách đến với Công ty TNHH Chứng khoán NH Việt Nam (“NHSV”)
email.createAccount.text3 = NHSV trân trọng thông báo tài khoản giao dịch chứng khoán của Quý khách đã được mở thành công, thông tin chi tiết về tài khoản của Quý khách như sau:
email.createAccount.text4 = Tên chủ tài khoản:
email.createAccount.text5 = Số tài khoản:
email.createAccount.text6 = Quý khách vui lòng kiểm tra tin nhắn NHSV gửi tới số điện thoại Quý khách đã đăng ký để nhận thêm thông tin đăng nhập và đặt lệnh trên hệ thống. NHSV khuyến nghị Quý khách thường xuyên tự thay đổi mật khẩu để đạt được sự an toàn cao nhất. 
email.createAccount.text8 = Ngay bây giờ, Quý khách có thể giao dịch và trải nghiệm các dịch vụ tại NHSV:
email.createAccount.text9 = Hướng dẫn nộp tiền vào tài khoản chứng khoán. 
email.createAccount.link1 = https://www.youtube.com/watch?v=Ja0x2TUMCvA&list=PL4G4x2YzIW8dgcyF2sduUuLZN67zG8QwZ&index=4
email.createAccount.text10 = Hướng dẫn giao dịch trên Mobile. 
email.createAccount.link2 = https://www.youtube.com/watch?v=_Lqo1_OGJ2g&list=PL4G4x2YzIW8dgcyF2sduUuLZN67zG8QwZ&index=3
email.createAccount.text11 = Hướng dẫn giao dịch Web trading. 
email.createAccount.text12 = Hướng dẫn giao dịch Home trading. 
email.createAccount.text13 = Lưu ý: NHSV có thể tái thẩm định Hồ sơ đăng ký mở tài khoản thành công của Quý khách. Trong trường hợp cần thiết, NHSV sẽ gửi yêu cầu bổ sung hồ sơ gốc đến Quý khách. NHSV rất mong nhận được sự hợp tác của Quý khách hàng.
email.createAccount.text15 = Để được hỗ trợ thêm thông tin, Quý khách vui lòng liên hệ Nhân viên chăm sóc tài khoản hoặc Hotline 19001055 hoặc tham khảo thông tin trên website https://nhsv.vn
email.createAccount.text16 = NHSV hân hạnh được phục vụ Quý khách và chúc Quý khách đầu tư thành công!
email.createAccount.signature = Trân trọng,
email.createAccount.footer = Head Office NHSV Tầng 9, Tháp Đông, Lotte Center, 54 Liễu Giai, Hà Nội | Tel: 02439413369 | Fax: (04)9410248 | E_mail: support@nhsv.vn

