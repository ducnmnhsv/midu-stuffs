openapi: 3.0.0
info:
  title: Tuxedo API Specification
  version: 1.0.0
  description: Tuxedo API Specification
servers:
  - url: https://nhsvpro.nhsv.vn/rest
    description: TRADEX API PROD Server
  - url: https://tnhsvpro.nhsv.vn/rest
    description: TRADEX API UAT Server
components:
  securitySchemes:
    jwt:
      type: apiKey
      in: header
      name: Authorization
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          description: "error code"
        message:
          type: string
          description: "error message"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
          description: "error message"
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: access token
        refreshToken:
          type: string
          description: refresh token
        userInfo:
          type: object
          description: information of user 
          properties:
              username:
                type: string
              id:
                type: number
              avatar:
                type: string
              birthday:
                type: string
              email:
                type: string
              phoneCode:
                type: string
              phoneNumber:
                type: string
              identifierNumber:
                type: string
              accounts:
                type: array
                items: 
                  type: object
                  properties:
                    accountNumber:
                      type: string
                    accountName:
                      type: string
                    accountSubs:
                      type: array
                      items:
                        type: object
                        properties:
                          subNumber:
                            type: string
                          bankAccounts:
                            type: array
                            items:
                              type: object
                              properties: 
                                bankCode:
                                  type: string
                                bankName: 
                                  type: string
                          type: 
                            type: string
              userLevel:
                type: string
        accExpiredTime:
          type: number
          description: expried time
        refExpiredTime:
          type: number
          description: ref expried time
    LoginPasswordOTPResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: access token
        refreshToken:
          type: string
          description: refresh token
        otpIndex:
          type: string
          description: OTP index on card
        accExpiredTime:
          type: number
          description: expried time
        refExpiredTime:
          type: number
          description: ref expried time
paths:
  /api/v1/equity/order/history:
    get:
      tags:
      - TUXEDO
      - ORDER
      summary: Query Order History
      operationId: EQUITY_ORDER_HISTORY
      parameters:
        - in: query
          name: accountNumber
          schema:
            type: string
          description: Account number
          required: true
        - in: query
          name: subNumber
          schema:
            type: string
          description: Sub number
        - in: query
          name: fromDate
          schema:
            type: string
          description: From date
        - in: query
          name: toDate
          schema:
            type: string
          description: To date
        - in: query
          name: stockCode
          schema:
            type: string
          description: Stock code
        - in: query
          name: sellBuyType
          schema:
            type: string
            enum: ['BUY', 'SELL', 'ALL']
          description: Sell buy type
        - in: query
          name: matchType
          schema:
            type: string
            enum: ['MATCHED','UNMATCHED','ALL']
          description: Match type
        - in: query
          name: sortType
          schema:
            type: string
            enum: ['DESC','ASC']
          description: Sort type
        - in: query
          name: nextKey
          schema:
            type: string
          description: To get next record
        - in: query
          name: lastOrderDate
          schema: 
            type: string
          description: Order date of the last item
        - in: query
          name: fetchCount
          schema:
            type: number
          description: Fetch count
        - in: query
          name: marketType
          schema:
            type: string
            enum: ['HOSE', 'HNX', 'UPCOM', 'ALL']
          description: Market type
        - in: query
          name: deviceUniqueId
          schema:
            type: string
          description: User's device unique ID
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: 
                  type: object
                  properties:
                    accountNumber:
                      type: string
                      description: Account number
                    stockCode: 
                      type: string
                      description: Stock code
                    orderDate:
                      type: string
                      description: Order date
                    orderTime:
                      type: string
                      description: Order time
                    sellBuyType:
                      type: string
                      enum: ['BUY', 'SELL', 'ALL']
                      description: Sell buy type
                    orderType: 
                      type: string
                      enum: ['LO', 'MP', 'ATO', 'ATC', 'AON', 'BIG_LOT', 'MOK', 'MAK','MTL','IO', 'SO_GREATER','SO_LESS', 'SBO','OBO', 'PLO','ALL']
                      description: Order type
                    orderQuantity: 
                      type: number
                      description: Order amount
                    orderPrice: 
                      type: number
                      description: Order price
                    matchedPrice:
                      type: number
                      description: Matched price
                    matchedQuantity:
                      type: number
                      description: Matched quantity
                    matchedAmount:
                      type: number
                      description: Matched amount
                    unmatchedQuantity:
                      type: number
                      description: Unmatched quantity
                    modifyCancelType:
                      type: string
                      enum: ['NORMAL','PARTIAL_CORRECTION','ALL_CORRECTION','PARTIAL_CANCEL','ALL_CANCEL']
                      description: Modify cancel type
                    modifyCancelQuantity:
                      type: number
                      description: Modify cancel quantity
                    orderStatus:
                      type: string
                      enum: ['RECEIPT','SEND','ORDER_CONFIRM','RECEIPT_CONFIRM','FULL_FILLED','PARTIAL_FILLED','REJECT']
                      description: Order status
                    orderNumber:
                      type: string
                      description: Order number
                    originalOrderNumber:
                      type: string
                      description: Original order number
                    subNumber: 
                      type: string
                      description: Sub number
                    bankName: 
                      type: string
                      description: Bank name
                    sender: 
                      type: string
                      description: User who placed order
                    nextKey: 
                      type: string
                      description: To get the next record 
          description: Query Order History Successfully
      security:
        - jwt: []
  /api/v1/equity/account/profitLoss:
    get:
      tags:
      - TUXEDO
      - ACCOUNT
      summary: Query Account Profit Loss
      operationId: EQUITY_ACCOUNT_PROFIT_LOSS
      parameters:
        - in: query
          name: accountNumber
          schema:
            type: string
          description: Account number
          required: true
        - in: query
          name: subNumber
          schema:
            type: string
          description: Sub number
        - in: query
          name: bankCode
          schema:
            type: string
          description: Bank code - retrieve from /api/v1/equity/account/banks
        - in: query
          name: lastStockCode
          schema:
            type: string
          description: Last stock code
        - in: query
          name: fetchCount
          schema:
            type: number
          description: Fetch count
        - in: query
          name: bankName
          schema:
            type: string
          description: Bank name
        - in: query
          name: deviceUniqueId
          schema: 
            type: string
          description: User's device unique ID 
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  t1Deposit:
                    type: number
                    description: T1 deposit
                  t2Deposit:
                    type: number
                    description: T2 deposit
                  tTradeValue:
                    type: number
                    description: T trade value
                  depositAmount:
                    type: number
                    description: Deposit amount
                  totalBuyAmount:
                    type: number
                    description: Total buy amount
                  profitLossItems:
                    type: array
                    items:
                      type: object
                      properties:
                        t1Buy:
                          type: number
                          description: T1 buy
                        t2Buy:
                          type: number
                          description: T2 buy
                        t1Sell:
                          type: number
                          description: T1 sell
                        t2Sell:
                          type: number
                          description: T2 sell
                        todayBuy:
                          type: number
                          description: Today buy
                        stockCode:
                          type: string
                          description: Stock code
                        todaySell:
                          type: number
                          description: Today sell
                        profitLoss:
                          type: number
                          description: Profit loss
                        buyingPrice:
                          type: number
                          description: Buying price
                        buyingAmount:
                          type: number
                          description: Buying amount
                        currentPrice:
                          type: number
                          description: Current price
                        buyingQuantity:
                          type: number
                          description: Buying quantity
                        profitLossRate:
                          type: number
                          description: Profit loss rate
                        balanceQuantity:
                          type: number
                          description: Balance quantity
                        evaluationAmount:
                          type: number
                          description: Evaluation amount
                        sellableQuantity:
                          type: number
                          description: Sellable quantity
                    description: profitLossItems
                  totalProfitLoss:
                    type: number
                    description: Total profit loss
                  estimatedDeposit:
                    type: number
                    description: Estimated deposit
                  totalProfitLossRate:
                    type: number
                    description: Total profit loss rate
                  totalEvaluationAmount:
                    type: number
                    description: Total evaluation amount
          description: Query Account Profit Loss Successfully
      security:
        - jwt: []
  /api/v1/equity/account/buyable:
    get:
      tags:
      - TUXEDO
      - ACCOUNT
      summary: Query Account Buy Able
      operationId: EQUITY_ACCOUNT_BUYABLE
      parameters:
        - in: query
          name: accountNumber
          schema:
            type: string
          description: Account number
          required: true
        - in: query
          name: subNumber
          schema:
            type: string
          description: Sub number
        - in: query
          name: bankCode
          schema:
            type: string
          description: Bank code - retrieve from /api/v1/equity/account/banks
        - in: query
          name: stockCode
          schema:
            type: string
          description: Stock code
          required: true
        - in: query
          name: securitiesType
          schema:
            type: string
            enum: ['STOCK','BOND', 'FUND', 'ETF','CW', 'ALL']
          description: Securities type
        - in: query
          name: marketType
          schema:
            type: string
            enum: ['HOSE','HNX','UPCOM','ALL']
          description: Market type
        - in: query
          name: orderPrice
          schema:
            type: number
          description: Order price
          required: true
        - in: query
          name: orderQuantity
          schema:
            type: number
          description: Order quantity
        - in: query
          name: bankName
          schema:
            type: string
          description: Bank name
        - in: query
          name: deviceUniqueId
          schema: 
            type: string
          description: User's device unique ID 
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  lackAmount:
                    type: number
                    description: Lack amount
                  buyingPower:
                    type: number
                    description: Buying power
                  depositAmount:
                    type: number
                    description: Deposit amount
                  buyableQuantity:
                    type: number
                    description: Buyable quantity
                  marginLimitation:
                    type: number
                    description: Margin limitation
                  orderBlockAmount:
                    type: number
                    description: Order block amount
                  totalBlockAmount:
                    type: number
                    description: Total block amount
                  assetValuationAmount:
                    type: number
                    description: Asset valuation amount
                  stockValuationAmount:
                    type: number
                    description: Stock valuation amount
                  virtualDepositAmount:
                    type: number
                    description: Virtual deposit amount
          description: Query Account Buy Able Successfully
      security:
        - jwt: []
  /api/v1/equity/account/sellable:
    get:
      tags:
      - TUXEDO
      - ACCOUNT
      summary: Query Account Sellable
      operationId: EQUITY_ACCOUNT_SELLABLE
      parameters:
        - in: query
          name: accountNumber
          schema:
            type: string
          description: Account number
          required: true
        - in: query
          name: subNumber
          schema:
            type: string
          description: Sub number
        - in: query
          name: date
          schema:
            type: string
          description: Date
        - in: query
          name: stockCode
          schema:
            type: string
          description: Stock code
        - in: query
          name: fetchCount
          schema:
            type: number
          description: Fetch count
        - in: query
          name: deviceUniqueId
          schema: 
            type: string
          description: User's device unique ID 
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: 
                  type: object
                  properties:
                    t1Buy:
                      type: number
                      description: T1 buy
                    t2Buy:
                      type: number
                      description: T2 buy
                    t1Sell:
                      type: number
                      description: T1 sell
                    t2Sell:
                      type: number
                      description: T2 sell
                    todayBuy:
                      type: number
                      description: Today buy
                    stockCode:
                      type: string
                      description: Stock code
                    todaySell:
                      type: number
                      description: Today sell
                    balanceQuantity:
                      type: number
                      description: Balance quantity
                    sellableQuantity:
                      type: number
                      description: Sellable quantity
          description: Query Account Sell Able Successfully
      security:
        - jwt: []
  /api/v1/equity/order/advance:
    post:
      tags:
      - TUXEDO
      - ORDER
      summary: Place Advanced Order
      operationId: EQUITY_PLACE_ADVANCE_ORDER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bankCode:
                  type: string
                  description: Bank code - retrieve from /api/v1/equity/account/banks
                orderType:
                  type: string
                  enum: ['LO', 'MP', 'ATO', 'ATC', 'AON', 'BIG_LOT', 'MOK', 'MAK','MTL','IO', 'SO_GREATER', 'SO_LESS', 'SBO','OBO', 'PLO','ALL']
                  description: Order type
                stockCode:
                  type: string
                  description: Stock code
                subNumber:
                  type: string
                  description: Sub number
                orderPrice:
                  type: number
                  description: Order price
                bankAccount:
                  type: string
                  description: Bank account - retrieve from /api/v1/equity/account/banks
                phoneNumber:
                  type: string
                  description: Phone number - retrieve from api/v1/lotte/equity/account/info
                sellBuyType:
                  type: string
                  enum: ['BUY', 'SELL']
                  description: Sell buy type
                accountNumber:
                  type: string
                  description: Account number
                orderQuantity:
                  type: number
                  description: Order quantity
                securitiesType:
                  type: string
                  enum: ['STOCK','BOND', 'FUND', 'ETF','CW', 'ALL']
                  description: Securities type
                advanceOrderDate:
                  type: string
                  description: Advance order date
                deviceUniqueId:
                  type: string
                  description: Unique ID of user device 
              required: 
                - accountNumber
                - stockCode
                - orderQuantity
                - orderPrice
                - bankCode
                - deviceUniqueId
                - sellBuyType
                - orderType
                - phoneNumber
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Message
                  tempOrderNumber:
                    type: string
                    description: Temp order number
          description: Order Stock Advance Successfully
      security:
        - jwt: []
  /api/v1/equity/order/modify:
    put:
      tags:
      - TUXEDO
      - ORDER
      summary: Modify Stock Order
      operationId: EQUITY_MODIFY_ORDER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bankCode:
                  type: string
                  description: Bank code - retrieve from /api/v1/equity/account/banks
                bankName:
                  type: string
                  description: Bank name - retrieve from /api/v1/equity/account/banks
                orderType:
                  type: string
                  description: Order type of selected order - retrieve from response of /api/v1/equity/order/history
                stockCode:
                  type: string
                  description: Stock code
                subNumber:
                  type: string
                  description: Sub number
                branchCode:
                  type: string
                  description: Branch code of selected order - retrieve from accessToken.deptCode or from response of api/v1/login
                marketType:
                  type: string
                  enum: ['HOSE','HNX','UPCOM','ALL']
                  description: Market type
                orderPrice:
                  type: number
                  description: Order price
                bankAccount:
                  type: string
                  description: Bank account - retrieve from /api/v1/equity/account/banks
                orderNumber:
                  type: string
                  description: Order number - retrieve from response of /api/v1/equity/order/history?matchType=UNMATCHED
                sellBuyType:
                  type: string
                  description: Sell buy type of selected order - retrieve from response of /api/v1/equity/order/history
                accountNumber:
                  type: string
                  description: Account number
                orderQuantity:
                  type: number
                  description: Order quantity
                securitiesType:
                  type: string
                  enum: ['STOCK','BOND', 'FUND', 'ETF','CW', 'ALL']
                  description: Securities type
                deviceUniqueId:
                  type: string
                  description: User's device unique ID
              required:
              - accountNumber
              - branchCode
              - orderNumber
              - orderQuantity
              - orderPrice
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: Type
                  orderNumber:
                    type: string
                    description: Order number
          description: Modify Stock Order Successfully
      security:
        - jwt: []
  /api/v1/equity/order/cancel:
    put:
      tags:
      - TUXEDO
      - ORDER
      summary: Cancel Stock Order
      operationId: EQUITY_CANCEL_ORDER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subNumber:
                  type: string
                  description: Sub number
                branchCode:
                  type: string
                  description: Branch code of selected order - retrieve from accessToken.deptCode or from response of api/v1/login
                orderNumber:
                  type: string
                  description: Order number - retrieve from /api/v1/equity/order/history?matchType=UNMATCHED
                accountNumber:
                  type: string
                  description: Account number
                deviceUniqueId:
                  type: string
                  description: User's device unique ID
              required:
                - accountNumber
                - branchCode
                - orderNumber  
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderNumber:
                    type: string
                    description: Order number
          description: Cancel Stock Order Successfully
      security:
        - jwt: []
  /api/v1/equity/order/advance/cancel:
    put:
      tags:
      - TUXEDO
      - ORDER
      summary: Cancel Stock Order Advance
      operationId: EQUITY_CANCEL_ADVANCE_ORDER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subNumber:
                  type: string
                  description: Sub number
                orderNumber:
                  type: string
                  description: Order number - retrieve from response of /api/v1/equity/order/advance/history
                accountNumber:
                  type: string
                  description: Account number
                advanceOrderDate:
                  type: string
                  description: Advance order date of selected order - retrieve from response of  /api/v1/equity/order/advance/history
                deviceUniqueId:
                  type: string
                  description: User's device unique ID
              required: 
                - accountNumber
                - orderNumber
                - advanceOrderDate
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Message
          description: Cancel Stock Order Advance Successfully
      security:
        - jwt: []
  /api/v1/equity/rights/available:
    get:
      tags:
      - TUXEDO
      - RIGHTS
      summary: Query Right Available
      operationId: EQUITY_RIGHTS_AVAILABLE
      parameters:
        - in: query
          name: accountNumber
          schema:
            type: string
          description: Account number
          required: true
        - in: query
          name: subNumber
          schema:
            type: string
          description: Sub number
        - in: query
          name: rightType
          schema:
            type: string
            enum: ['1', '4']
          description: |
            - 1 - Subscription   
            - 4 - Bond  
        - in: query
          name: fetchCount
          schema:
            type: number
          description: Fetch count
        - in: query
          name: lastBaseDate
          schema:
            type: string
          description: Last base date
        - in: query
          name: lastStockCode
          schema:
            type: string
          description: Last stock code
        - in: query
          name: lastSequenceNumber
          schema:
            type: string
          description: Last sequence number
        - in: query
          name: deviceUniqueId
          schema:
            type: string
          description: User's device unique ID
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: 
                  type: object
                  properties:
                    note:
                      type: string
                      description: Note
                    endDate:
                      type: string
                      description: End date
                    baseDate:
                      type: string
                      description: Base date
                    startDate:
                      type: string
                      description: Start date
                    stockCode:
                      type: string
                      description: Stock code
                    stockName:
                      type: string
                      description: Stock name
                    issuePrice:
                      type: number
                      description: Issue price
                    rightStatus:
                      type: string
                      description: Right status
                    sequenceNumber:
                      type: number
                      description: Sequence number
                    availableQuantity:
                      type: number
                      description: Available quantity
          description: Query Right Available Successfully
      security:
        - jwt: []
  /api/v1/equity/rights/detail:
    get:
      tags:
      - TUXEDO
      - RIGHTS
      summary: Query Right Detail
      operationId: EQUITY_RIGHTS_DETAIL
      parameters:
        - in: query
          name: stockCode
          schema:
            type: string
          description: Stock code - retrieve from response of /api/v1/equity/rights/available
          required: true
        - in: query
          name: accountNumber
          schema:
            type: string
          description: Account number
          required: true
        - in: query
          name: subNumber
          schema:
            type: string
          description: Sub number
        - in: query
          name: baseDate
          schema:
            type: string
          description: Base date of selected right - retrieve from response of /api/v1/equity/rights/available
          required: true
        - in: query
          name: rightType
          schema:
            type: string
            enum: ['1','4']
          description: | 
            - 1 : Subscription
            - 4 : Bond 
          required: true
        - in: query
          name: sequenceNumber
          schema:
            type: number
          description: Sequence number of selected right - retrieve from response of /api/v1/equity/rights/available
          required: true
        - in: query
          name: bankCode
          schema: 
            type: string
          description: Account bank code - retrieve from response of /api/v1/equity/account/banks
          required: true
        - in: query
          name: bankName
          schema: 
            type: string
          description: Account bank name - retrieve from response of /api/v1/equity/account/banks
        - in: query
          name: deviceUniqueId
          schema:
            type: string
          description: User's device unique ID
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: 
                  type: object
                  properties:
                    endDate:
                      type: number
                      description: End date
                    quantity:
                      type: string
                      description: Quantity
                    startDate:
                      type: number
                      description: Start date
                    issuePrice:
                      type: number
                      description: Issue price
                    tradeNumber:
                      type: string
                      description: Trade number
                    availableAmount:
                      type: number
                      description: Available amount
                    standardQuantity:
                      type: number
                      description: Standard quantity
                    availableQuantity:
                      type: number
                      description: Available quantity
                    processStatusCode:
                      type: number
                      description: Process status code
                    processStatusName:
                      type: number
                      description: Process status name
                    approveWaitingQuantity:
                      type: number
                      description: Approve waiting quantity
                    bankCancelWaitingQuantity:
                      type: number
                      description: Bank cancel waiting quantity
          description: Query Right Detail Successfully
      security:
        - jwt: []
  /api/v1/equity/rights/register:
    post:
      tags:
      - TUXEDO
      - RIGHTS
      summary: Register Right
      operationId: EQUITY_RIGHTS_REGISTER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  description: Amount 
                bankCode:
                  type: string
                  description: Bank code - retrieve from /api/v1/equity/account/banks
                baseDate:
                  type: string
                  description: Base date - retrieve from response of /api/v1/equity/rights/detail
                quantity:
                  type: number
                  description: Quantity
                rightType:
                  type: string
                  description: Right type - retrieve from response of /api/v1/equity/rights/detail
                stockCode:
                  type: string
                  description: Stock code
                subNumber:
                  type: string
                  description: Sub number
                bankAccount:
                  type: string
                  description: Bank account - retrieve from /api/v1/equity/account/banks
                tradeNumber:
