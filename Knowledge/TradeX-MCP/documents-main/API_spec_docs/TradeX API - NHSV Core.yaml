  /api/v1/login:
    post:
      tags:
        - AUTHENTICATION
        - TUXEDO
      summary: Login to get access token
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  description: type of login
                  type: string
                  enum:
                    - password
                    - biometric
                    - password_otp
                    - biometric_otp 
                    - client_credentials
                client_id:
                  description: id of app
                  type: string
                client_secret:
                  description: A secret for id
                  type: string
                username:
                  description: Paave username
                  type: string
                device_id:
                  type: string
                  description: unique device id required if client is phone number or grant_type is biometric
                password:
                  type: string
                  description: (for **Password Login**) user password 
                  format: password
                signatureValue: 
                  type: string
                  description: (for **Biometric Login**) signature generated from private key of biometric and username
                deviceUniqueId:
                  type: string
                  description: User's device unique ID
              required:
                - grant_type
                - client_id
                - client_secret
                - username
                - password
                - signatureValue
      responses:
        '200':
          description: Refresh Token Successfully
          content:
            application/json:
              schema:
                oneOf: 
                 - $ref: '#/components/schemas/LoginPasswordOTPResponse'
                 - $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid input param
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/equity/order/stop:
    post:
      tags:
      - TUXEDO
      - ORDER
      summary: Place Stop or Stop Limit Order
      operationId: ORDER_PLACE_STOP_ORDER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accountNumber:
                  type: string
                  description: account number to place order
                subNumber:
                  type: string
                  description: 'sub number to place order, default is **00** if not set'
                code: 
                  type: string
                  description: stock code to place order
                orderQuantity: 
                  type: number
                  format: integer
                  description: quantity of order
                sellBuyType:
                  enum:
                    - BUY
                    - SELL
                  type: string
                  description: indicate sell or buy order
                orderType: 
                  enum:
                    - STOP
                    - STOP_LIMIT
                  type: string
                  description: the type of the stop order'
                stopPrice:
                  type: number
                  format: double
                  description: stop price of order
                orderPrice:
                  type: number
                  format: double
                  description: price to place stop limit order
                fromDate: 
                  type: string
                  pattern: '^[0-9]{8}$'
                  description: 'fromDate, format (YYYYMMDD)'
                toDate:
                  type: string
                  pattern: '^[0-9]{8}$'
                  description: 'toDate, format (YYYYMMDD)'
                bankCode:
                  type: string
                  description: 'bank using to place order, default is **9999** if not set'
                bankAccount:
                  type: string
                  description: bank account using to place order
                bankName:
                  type: string
                  description: bank name using to place order
                deviceUniqueId:
                  type: string
                  description: User's device unique ID
              required: 
                - accountNumber
                - subNumber
                - code
                - orderQuantity
                -  sellBuyType
                - orderType
                - stopPrice
                - orderPrice
                - bankCode
                - bankAccount
                - bankName
                - deviceUniqueId
        description: Order Stop object
      responses:
        '200':
          description: Place Order Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
        '401':
          description: Your access token is invalid or expired
      security:
        - jwt: []
  /api/v1/equity/order/stop/modify:
    put:
      tags:
      - TUXEDO
      - ORDER
      summary: Modify Stop or Stop Limit Order
      operationId: ORDER_MODIFY_STOP_ORDER
      requestBody:
        content:
          application/json:
            schema:
              type: object
              allOf:
                - type: object
                  properties:
                    stopOrderId:
                      type: number 
                      description: stop order ID that needs to modify
                    orderQuantity:
                      type: number
                      description: new order quantity to be updated
                    stopPrice:
                      type: number
                      format: double
                      description: new stop price to be updated
                    orderPrice:
                      type: number
                      format: double
                      description: new order price to be updated
                    fromDate:
                      type: string
                      pattern: '^[0-9]{8}$'
                      description: 'fromDate, format (YYYYMMDD)'
                    toDate: 
                      type: string
                      pattern: '^[0-9]{8}$'
                      description: 'toDate, format (YYYYMMDD)'
                    deviceUniqueId:
                      type: string
                      description: User's device unique ID
                  required: 
                    - stopOrderId
                    - orderQuantity
                    - stopPrice
                    - orderPrice
                    - fromDate
                    - toDate
        description: Order Stop object
      responses:
        '200':
          description: Modify Stop Order Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          description: Your access token is invalid or expired
      security:
        - jwt: []
  /api/v1/equity/order/stop/cancel:
    put:
      tags:
      - TUXEDO
      - ORDER
      summary: Cancel Stop or Stop Limit Order
