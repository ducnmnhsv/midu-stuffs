<!DOCTYPE html>
<html>
<head>
    <title>Subscribe OneSignal</title>
    <link rel="manifest" href="/onesignal/manifest.json" />
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js"></script>
</head>
<body>
<div class="container">
    Key: <input type ="text" id="key_tag"/>
    Value: <input type ="text" id="value_tag"/>
    <input type="button" id="send_tag" onclick="sendTag()" value="Send Tag" />
</div>
<script type="text/javascript">

  var OneSignal = window.OneSignal || [];
        OneSignal.push(function() {
        OneSignal.init({
          appId: "c3867652-3931-4765-93c1-85e0dbb22213",
        });
    });

    function sendTag() {
        OneSignal.push(function() {
            var key = document.getElementById('key_tag').value;
            var value = document.getElementById('value_tag').value;
               alert(key +'  ' + value)

            OneSignal.sendTag(key, value, function(tagsSent) {
               alert('send tag success!' + tagsSent)
            });
        });
    }
</script>
</body>
</html>
