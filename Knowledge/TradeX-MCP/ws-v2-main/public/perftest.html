
<!DOCTYPE html>
<html>

<head>
    <title>Query</title>
    <script type="text/javascript" src="socketcluster.js"></script>
    <script type="text/javascript" src="sc-codec-min-bin.js"></script>
</head>

<body>
    <div class="container">
        <table>
            <tr>
                <td>grant type</td>
                <td>
                    <input id="grant_type" value="password_tradex" />
                </td>

                <td>client id</td>
                <td>
                    <input id="client_id" value="tradex-mts" />
                </td>

                <td>client secret</td>
                <td>
                    <input id="client_secret" value="tradex-mts" />
                </td>
            </tr>
            <tr>
                <td>username</td>
                <td>
                    <input id="username" value="nmhung109@gmail.com" />
                </td>

                <td>password</td>
                <td>
                    <input id="password" value="123456" />
                </td>

                <td></td>
                <td>
                    <button onclick="login()">Login</button>
                </td>
            </tr>
            
            <tr>
                <td></td>
                <td>
                </td>

                <td></td>
                <td>
                    <button onclick="logout()">Logout</button>
                </td>

                <td></td>
                <td>
                    <button onclick="checkLoginStatus()">Check status</button>
                </td>
            </tr>

            
            <tr>
                <td>access_token</td>
                <td>
                    <input id="access_token" value="" />
                </td>

                <td>refresh_token</td>
                <td>
                    <input id="refresh_token" value="" />
                </td>

                <td>userinfo</td>
                <td>
                    <textarea id="userinfo" ></textarea>
                </td>
            </tr>

            <tr>
                <td>
                    <button onclick="loginWithAccessToken()">Login With Access Token</button>
                </td>
                <td></td>

                <td>
                    <button onclick="loginWithRefreshToken()">Login With Refresh Token</button>
                </td>
            </tr>
    
            <tr>
                <td colspan="6">
                    <table id="tblquery">
                        
                    </table>
                    <button onclick="addQuery()">Add More</button>
                    <button onclick="loadQuery()">Load Previous Query</button>
                </td>
            </tr>
            <tr>
                <td>
                    <button onclick="send()">Send</button>
                </td>
            </tr>
        </table>
    </div>
    <script type="text/javascript">
        var stockQuoteCount = 0;
        var getQueryTemplate = function(uri='get:/api/v1/market/index/list', body={}, headers={
                    "accept-language": "en"
                }) {
            return {
                uri: uri,
                body: body,
                headers: headers,
            };
        } 
        var queryData = [
            getQueryTemplate(),
        ];

        var renderQuery = function() {
            var innerHtml = '';
            for(var i =0; i< queryData.length; i++) {
                innerHtml += `<tr>
                            <td>uri</td>
                            <td>
                                <input onchange="onUriChange(event)" rowno="${i}" value="${queryData[i].uri}" />
                            </td>
            
                            <td>body</td>
                            <td>
                                <textarea onchange="onBodyChange(event)" rowno="${i}" cols="30" rows="10">${JSON.stringify(queryData[i].body)}</textarea>
                            </td>
            
                            <td>headers</td>
                            <td>
                                <textarea onchange="onHeaderChange(event)" rowno="${i}" cols="30" rows="10">${JSON.stringify(queryData[i].headers)}</textarea>
                            </td>
                        </tr>`;
            }
            document.getElementById('tblquery').innerHTML = innerHtml;
        }

        function loadQuery() {
            if (window.localStorage.queries) {
                queryData = JSON.parse(window.localStorage.queries);
                renderQuery();
            }
        }

        function addQuery() {
            queryData.push(getQueryTemplate());
            renderQuery();
        }

        function onUriChange(e) {
            queryData[e.target.getAttribute('rowno')].uri = e.target.value;
        }

        function onBodyChange(e) {
            queryData[e.target.getAttribute('rowno')].body = JSON.parse(e.target.value);
        }

        function onHeaderChange(e) {
            queryData[e.target.getAttribute('rowno')].headers = JSON.parse(e.target.value);
        }

        function send() {
            window.localStorage.queries = JSON.stringify(queryData);
            for (var i = 0; i < queryData.length; i++) {
                sendOne(queryData[i]);
            }
        }

        function sendOne(body) {
            socket.emit('doQuery', body, function (err, data) {
                if (err) {
                    console.log(body, err.status);
                    console.error(body, err);
                } else {
                    console.log('query success', body, data);
                }
            });
        }


        document.addEventListener('DOMContentLoaded', function(){
            renderQuery();
        });

        // Initiate the connection to the server
        var socket = socketCluster.connect({
            // hostname: window.location.hostname,
            // port: window.location.port,
            port: 8000,
            ssl: false,
            codecEngine: scCodecMinBin,
        });
        socket.on('error', function (err) {
            console.error(err);
        });

        socket.on('connect', function () {
            console.log('Socket is connected');
        });

        function setLoginData(data) {
            if (data.data) {
                document.getElementById('access_token').value = data.data.accessToken;
                document.getElementById('refresh_token').value = data.data.refreshToken;
                document.getElementById('userinfo').value = data.data.userInfo ? JSON.stringify(data.data.userInfo) : '';
            }
        }

        function logout() {
            socket.emit('logout', {});
        }

        function checkLoginStatus() {
            console.log(socket.authState);
            console.log(socket.authToken);
        }

        function loginWithAccessToken() {
            socket.emit('login', {
                body: {
                    grant_type: 'access_token',
                    access_token: document.getElementById('access_token').value,
                },
                headers: getQueryTemplate().headers
            }, function (err, data) {
                if (err) {
                    console.error(err);
                } else {
                    console.log('login access token success', data);
                    setLoginData(data)
                }
            });
        }

        function loginWithRefreshToken() {
            socket.emit('login', {
                body: {
                    grant_type: 'refresh_token',
                    client_id: document.getElementById('client_id').value,
                    client_secret: document.getElementById('client_secret').value,
                    refresh_token: document.getElementById('refresh_token').value,
                },
                headers: getQueryTemplate().headers
            }, function (err, data) {
                if (err) {
                    console.error(err);
                } else {
                    console.log('login refresh token success', data);
                    setLoginData(data)
                }
            });
        }

        function login() {
            socket.emit('login', {
                body: {
                    grant_type: document.getElementById('grant_type').value,
                    client_id: document.getElementById('client_id').value,
                    client_secret: document.getElementById('client_secret').value,
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                },
                headers: getQueryTemplate().headers 
            }, function (err, data) {
                if (err) {
                    console.error(err);
                } else {
                    console.log('login success', data);
                    setLoginData(data)
                }
            });
        }
    </script>
</body>

</html>
