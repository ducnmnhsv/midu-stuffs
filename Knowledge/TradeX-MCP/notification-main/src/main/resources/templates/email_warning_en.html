<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Verify your email address</title>
    <style type="text/css">
        textarea {
            border: 3px solid #CC0000;
            width: 99%;
            margin: 5px 0;
            padding: 3px;
            resize: none;
        }
    </style>
</head>
<body>
<table
    style="width: 100%; margin: 0; padding: 0; background-color: #f5f7f9; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;"
    width="100%" cellspacing="0" cellpadding="0">
    <tbody>
    <tr>
        <td style="font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;"
            align="center">
            <table
                style="width: 100%; margin: 0; padding: 0; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;"
                width="100%" cellspacing="0" cellpadding="0"><!-- Logo -->
                <tbody>
                <tr>
                    <td style="padding: 25px 0; text-align: center; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;">
                        <a href="http://tradex.vn"
                           style="color: #1ca70b; font-size: 16px; font-weight: bold; text-decoration: none; text-shadow: 0 1px 0 white; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;">TradeX</a>
                    </td>
                </tr>
                <!-- Email Body -->
                <tr>
                    <td>
                        <textarea disabled rows="15%"
                                  style="color:#FF3333;background-color:#ffffff">${message}</textarea>
                    </td>
                </tr>
                <tr>
                    <td style="font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;">
                        <table
                            style="width: 570px; margin: 0 auto; padding: 0; text-align: center; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;"
                            width="570" cellspacing="0" cellpadding="0" align="center">
                            <tbody>
                            <tr>
                                <td style="padding: 35px; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;">
                                    <p style="margin-top: 0; color: #839197; font-size: 12px; line-height: 1.5em; text-align: center; font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; -webkit-box-sizing: border-box; box-sizing: border-box;">
                                        © TradeX</p>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </td>
                </tr>
                </tbody>
            </table>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
