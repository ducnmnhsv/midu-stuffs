<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>Invitation to join PAAVE Admin Page</title>
</head>

<body>
<table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
  <!-- START HEADER -->
  <tr>
    <td style="text-align: center">
      <img style="width: 587px; height: 231px;" src="https://paave-mobile-resource.s3.ap-southeast-1.amazonaws.com/static/background-include-text.png">
    </td>
  </tr>
  <!-- END HEADER -->
  <tr>
    <td style="
        text-align: center;
        box-shadow: unset">
      <div style="
            margin: 0 auto;
            max-width: 600px;">
        <!-- CONTENT EMAIL -->
        <div>
          <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="padding: 0 30px; width: 600px;
                        border-spacing: 0 30px;
                        ">
            <tr style="background: #FAFAFA;">
              <td style="text-align: left !important; padding: 15px; border-top-left-radius: 10px;border-top-right-radius: 10px;border-bottom-right-radius: 10px;border-bottom-left-radius: 10px;">
                <div class="button-container">
                  <button class="centered-button">
                    <a href="${url}">Join now</a>
                  </button>
                </div>
                <p>
                  <span>If you have trouble accessing the page with the link above, you can also use the following address <a href="${url}">${url}</a></span>
                  <br />
                  <br />
                  <span>Regards, </span>
                  <br />
                  <em>PAAVE.</em>
                </p>
            </tr>
            <tr style="background: #FAFAFA">
</body>

</html>
