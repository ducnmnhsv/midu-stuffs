<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="en">

<head>
  <title th:text="#{email.activation.title.vi}">Invitation to join NHSV Admin Page</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" th:href="@{|${baseUrl}/favicon.ico|}" />
</head>

<body>
<table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
  <!-- START HEADER -->
  <tr>
    <td style="text-align: center">
      <img style="width: 587px; height: 231px;" src="https://nhsv.vn/uploadfile/source/caidat/logo.png">
    </td>
  </tr>
  <!-- END HEADER -->
  <tr>
    <td style="
        text-align: center;
        box-shadow: unset">
      <div style="
            margin: 0 auto;
            max-width: 600px;">
        <!-- CONTENT EMAIL -->
        <div>
          <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="padding: 0 30px; width: 600px;
                        border-spacing: 0 30px;
                        ">
            <tr style="background: #FAFAFA;">
              <td
                style="text-align: left !important; padding: 15px; border-top-left-radius: 10px;border-top-right-radius: 10px;border-bottom-right-radius: 10px;border-bottom-left-radius: 10px;">
                <p style="margin-top: 0" th:text="#{email.activation.greeting.vi(${user.login})}">Dear</p>
                <p style="margin-top: 0">
                  <span th:text="#{email.creation.text1.vi}"></span>
                </p>
                <p style="margin-top: 0">
                  <span th:text="'Tên đăng nhập: '"></span>
                  <span th:text="${user.login}"></span>
                  </span>
                </p>

                <p style="margin-top: 0" th:if="${user.authorities.split(',').length > 0}">
                  <span th:text="'Vai trò: '"></span>
                  <span th:each="autho,iterStat : ${user.authorities.split(',')}">
                      <span th:text="${autho}">user</span>
                      <span th:if="${!iterStat.last}" th:text=" ' và ' "></span>
                    </span>
                </p>
                <div class="button-container">
                  <button class="centered-button">
                    <a th:with="url=(@{|${baseUrl}/account/finish?key=${user.activationKey}|})" th:href="${url}">Tham
                      gia ngay</a>
                  </button>
                </div>
                <p style="margin-top: 0">
                  <span th:text="'( Vui lòng truy cập '"></span>
                  <span style="color: #0000EE" th:with="url=(@{|${baseUrl}/account/finish?key=${user.activationKey}|})"
                        th:text=" ${url} "></span>
                  <span th:text="' để tạo tài khoản nếu bạn không thể ấn Tham gia ngay )'"></span>
                </p>
                <p>
                  <span th:text="#{email.activation.text2.vi}">Trân trọng, </span>
                  <br />
                  <em th:text="#{email.signature}">JHipster.</em>
                </p>
            </tr>
            <tr style="background: #FAFAFA"></tr>
          </table>
        </div>
      </div>
    </td>
  </tr>
</table>
</body>

</html>
