    name: /tmp/logs/application.log
  level:
    ROOT: INFO
    tech.jhipster: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: true
    com.difisoft.nhsv.admin: INFO

